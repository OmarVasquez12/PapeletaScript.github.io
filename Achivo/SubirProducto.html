<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Producto - Papeleta Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #050507 0%, #150a0a 100%);
            color: #e2e8f0;
        }
        .card {
            background: rgba(21, 10, 10, 0.6);
            border: 1px solid rgba(255, 26, 26, 0.15);
            backdrop-filter: blur(10px);
        }
        .input-field {
            background: rgba(13, 5, 5, 0.8);
            border: 1px solid rgba(255, 26, 26, 0.2);
        }
        .input-field:focus {
            border-color: #ff1a1a;
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.3);
        }
        .upload-zone {
            border: 2px dashed rgba(255, 26, 26, 0.3);
            background: rgba(255, 26, 26, 0.02);
            transition: all 0.3s ease;
        }
        .upload-zone:hover {
            border-color: rgba(255, 26, 26, 0.6);
            background: rgba(255, 26, 26, 0.05);
        }
        .upload-zone.dragover {
            border-color: #ff1a1a;
            background: rgba(255, 26, 26, 0.1);
        }
        .product-item {
            transition: all 0.3s ease;
        }
        .product-item:hover {
            background: rgba(255, 26, 26, 0.05);
            transform: translateX(4px);
        }
    </style>
</head>
<body class="min-h-screen p-6">

<div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-red-600 to-red-900 flex items-center justify-center font-black text-white text-xl">P</div>
            <div>
                <h1 class="text-2xl font-bold text-white">PAPELETA <span class="text-red-500">STORE</span></h1>
                <p class="text-gray-400 text-sm">Panel de Administración</p>
            </div>
        </div>
        <a href="AreaCliente.html" class="px-4 py-2 rounded-lg border border-red-600/30 text-red-400 hover:bg-red-600/10 transition-colors">
            <i class="fas fa-arrow-left mr-2"></i>Volver al Panel
        </a>
    </div>

    <!-- Sección Subir Producto -->
    <div class="card rounded-xl p-6 mb-8">
        <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
            <i class="fas fa-cloud-upload-alt text-red-500"></i>
            Subir Nuevo Producto
        </h2>
        
        <form id="upload-product-form" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-300 text-sm font-semibold mb-2">Nombre del Producto *</label>
                    <input type="text" id="product-name" required
                        class="input-field w-full rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none"
                        placeholder="Ej: Script de AutoFarm">
                </div>
                <div>
                    <label class="block text-gray-300 text-sm font-semibold mb-2">Precio (USD) *</label>
                    <input type="number" id="product-price" required min="0" step="0.01"
                        class="input-field w-full rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none"
                        placeholder="0.00">
                </div>
            </div>

            <div>
                <label class="block text-gray-300 text-sm font-semibold mb-2">Categoría *</label>
                <select id="product-category" required
                    class="input-field w-full rounded-xl px-4 py-3 text-sm text-white focus:outline-none">
                    <option value="">Seleccionar categoría...</option>
                    <option value="Scripts">Scripts</option>
                    <option value="Modelajes">Modelajes</option>
                    <option value="Mappings">Mappings</option>
                    <option value="Sitios Web">Sitios Web</option>
                    <option value="Bots Discord">Bots Discord</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>

            <div>
                <label class="block text-gray-300 text-sm font-semibold mb-2">Descripción/Detalle *</label>
                <textarea id="product-description" required rows="3"
                    class="input-field w-full rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none resize-none"
                    placeholder="Describe las características del producto..."></textarea>
            </div>

            <div>
                <label class="block text-gray-300 text-sm font-semibold mb-2">Link de YouTube (Opcional)</label>
                <input type="url" id="product-youtube"
                    class="input-field w-full rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none"
                    placeholder="https://youtube.com/watch?v=...">
            </div>

            <div>
                <label class="block text-gray-300 text-sm font-semibold mb-2">Fotos del Producto (Múltiples) *</label>
                <div class="upload-zone rounded-xl p-8 text-center cursor-pointer" onclick="document.getElementById('product-images').click()">
                    <i class="fas fa-images text-4xl text-red-400 mb-3"></i>
                    <p class="text-white font-semibold mb-1">Haz clic para agregar imágenes</p>
                    <p class="text-gray-400 text-xs">Puedes seleccionar varias imágenes a la vez</p>
                    <input type="file" id="product-images" multiple accept="image/*" class="hidden" onchange="handleImageSelect(event)">
                </div>
                <div id="image-preview-container" class="grid grid-cols-4 gap-3 mt-3"></div>
            </div>

            <div>
                <label class="block text-gray-300 text-sm font-semibold mb-2">Archivo del Producto (Zip/Rar/Lua) *</label>
                <div class="upload-zone rounded-xl p-6 text-center cursor-pointer" onclick="document.getElementById('product-file').click()">
                    <i class="fas fa-file-archive text-3xl text-red-400 mb-2"></i>
                    <p class="text-white font-semibold">Haz clic para subir el archivo</p>
                    <p class="text-gray-400 text-xs mt-1">Formatos: .zip, .rar, .lua</p>
                    <input type="file" id="product-file" accept=".zip,.rar,.lua" class="hidden" onchange="handleFileSelect(event)">
                </div>
                <div id="file-info" class="mt-2 p-3 bg-red-900/20 border border-red-600/30 rounded-lg hidden">
                    <p class="text-white text-sm font-semibold" id="file-name"></p>
                    <p class="text-gray-400 text-xs" id="file-size"></p>
                </div>
            </div>

            <button type="submit" class="btn-primary w-full py-4 rounded-xl text-white font-bold text-lg flex items-center justify-center gap-2">
                <i class="fas fa-save"></i>
                Agregar Producto a la Tienda
            </button>
        </form>
    </div>

    <!-- Lista de Productos -->
    <div class="card rounded-xl p-6">
        <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
            <i class="fas fa-list text-red-500"></i>
            Productos en la Tienda
        </h2>
        <div id="products-list" class="space-y-3">
            <div class="text-center py-12 text-gray-400">
                <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                <p>Cargando productos...</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuración de Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBWggE0KFiVZDxwxvmhuWXEKu6bNguV0mM",
        authDomain: "papeletalicencia.firebaseapp.com",
        projectId: "papeletalicencia",
        storageBucket: "papeletalicencia.firebasestorage.app",
        messagingSenderId: "677208314051",
        appId: "1:677208314051:web:a27c04f31d402e83f29276"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    let selectedImages = [];
    let selectedFile = null;

    // Manejar selección de imágenes
    function handleImageSelect(event) {
        const files = Array.from(event.target.files);
        selectedImages = files;
        
        const container = document.getElementById('image-preview-container');
        container.innerHTML = '';
        
        files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const div = document.createElement('div');
                div.className = 'relative aspect-square rounded-lg overflow-hidden border-2 border-red-600/30';
                div.innerHTML = `
                    <img src="${e.target.result}" class="w-full h-full object-cover">
                    <button type="button" onclick="removeImage(${index})" class="absolute top-1 right-1 w-6 h-6 bg-red-600 rounded-full flex items-center justify-center text-white text-xs hover:bg-red-700">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                container.appendChild(div);
            };
            reader.readAsDataURL(file);
        });
    }

    function removeImage(index) {
        selectedImages.splice(index, 1);
        const container = document.getElementById('image-preview-container');
        container.innerHTML = '';
        selectedImages.forEach((file, idx) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const div = document.createElement('div');
                div.className = 'relative aspect-square rounded-lg overflow-hidden border-2 border-red-600/30';
                div.innerHTML = `
                    <img src="${e.target.result}" class="w-full h-full object-cover">
                    <button type="button" onclick="removeImage(${idx})" class="absolute top-1 right-1 w-6 h-6 bg-red-600 rounded-full flex items-center justify-center text-white text-xs hover:bg-red-700">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                container.appendChild(div);
            };
            reader.readAsDataURL(file);
        });
    }

    // Manejar selección de archivo
    function handleFileSelect(event) {
        selectedFile = event.target.files[0];
        if (selectedFile) {
            document.getElementById('file-info').classList.remove('hidden');
            document.getElementById('file-name').textContent = selectedFile.name;
            document.getElementById('file-size').textContent = (selectedFile.size / 1024 / 1024).toFixed(2) + ' MB';
        }
    }

    // Subir archivo a Firebase Storage
    async function uploadFile(file, productName) {
        const timestamp = Date.now();
        const fileName = `${timestamp}_${file.name}`;
        const storageRef = storage.ref(`productos/${fileName}`);
        
        await storageRef.put(file);
        const downloadURL = await storageRef.getDownloadURL();
        return downloadURL;
    }

    // Subir imágenes a Firebase Storage
    async function uploadImages(images, productName) {
        const urls = [];
        for (let i = 0; i < images.length; i++) {
            const timestamp = Date.now() + i;
            const fileName = `${timestamp}_${images[i].name}`;
            const storageRef = storage.ref(`productos/${fileName}`);
            
            await storageRef.put(images[i]);
            const downloadURL = await storageRef.getDownloadURL();
            urls.push(downloadURL);
        }
        return urls;
    }

    // Manejar envío del formulario
    document.getElementById('upload-product-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Subiendo...';
        submitBtn.disabled = true;

        try {
            const name = document.getElementById('product-name').value;
            const price = parseFloat(document.getElementById('product-price').value);
            const category = document.getElementById('product-category').value;
            const description = document.getElementById('product-description').value;
            const youtube = document.getElementById('product-youtube').value;

            if (selectedImages.length === 0) {
                alert('Por favor selecciona al menos una imagen');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                return;
            }

            if (!selectedFile) {
                alert('Por favor selecciona el archivo del producto');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                return;
            }

            // Subir archivo principal
            const fileURL = await uploadFile(selectedFile, name);
            
            // Subir imágenes
            const imageUrls = await uploadImages(selectedImages, name);

            // Guardar en Firestore
            await db.collection('Productos').add({
                name: name,
                price: price,
                category: category,
                description: description,
                youtube_url: youtube || '',
                image_url: imageUrls[0], // Imagen principal
                all_images: imageUrls,
                file_data: fileURL,
                file_name: selectedFile.name,
                created_at: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'active'
            });

            alert('¡Producto subido exitosamente!');
            
            // Limpiar formulario
            document.getElementById('upload-product-form').reset();
            document.getElementById('image-preview-container').innerHTML = '';
            document.getElementById('file-info').classList.add('hidden');
            selectedImages = [];
            selectedFile = null;

            // Recargar lista
            loadProducts();

        } catch (error) {
            console.error('Error:', error);
            alert('Error al subir el producto: ' + error.message);
        } finally {
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    });

    // Cargar productos
    async function loadProducts() {
        const container = document.getElementById('products-list');
        
        try {
            const snapshot = await db.collection('Productos')
                .orderBy('created_at', 'desc')
                .get();
            
            if (snapshot.empty) {
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-400">
                        <i class="fas fa-box-open text-4xl mb-3"></i>
                        <p>No hay productos subidos aún</p>
                    </div>
                `;
                return;
            }

            const products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            container.innerHTML = products.map(product => `
                <div class="product-item bg-[#0d0505] border border-red-900/30 rounded-xl p-4 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <img src="${product.image_url || ''}" class="w-16 h-16 rounded-lg object-cover border border-red-900/30">
                        <div>
                            <h3 class="text-white font-bold">${product.name}</h3>
                            <p class="text-gray-400 text-xs">${product.category} • $${Number(product.price).toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="deleteProduct('${product.id}')" class="px-3 py-2 rounded-lg bg-red-600/20 text-red-400 hover:bg-red-600/30 transition-colors">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');

        } catch (error) {
            console.error('Error cargando productos:', error);
            container.innerHTML = `
                <div class="text-center py-8 text-red-400">
                    <i class="fas fa-exclamation-triangle text-2xl mb-2"></i>
                    <p>Error al cargar productos</p>
                </div>
            `;
        }
    }

    // Eliminar producto
    async function deleteProduct(productId) {
        if (!confirm('¿Estás seguro de eliminar este producto?')) return;
        
        try {
            await db.collection('Productos').doc(productId).delete();
            alert('Producto eliminado');
            loadProducts();
        } catch (error) {
            console.error('Error:', error);
            alert('Error al eliminar el producto');
        }
    }

    // Cargar productos al iniciar
    loadProducts();
</script>

</body>
</html>
