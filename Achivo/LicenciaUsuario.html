<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licencias de Usuario | Papeleta Store</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff1a1a'/%3E%3Cstop offset='1' stop-color='%23cc1b1b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='70' font-family='Arial, sans-serif' font-size='58' font-weight='900' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-dark: #050507;
            --card-bg: rgba(20, 10, 10, 0.6);
            --primary: #ff1a1a;
        }
        
        body {
            background: linear-gradient(135deg, #150a0a 0%, #0a0505 100%);
            color: #f3f4f6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111111; }
        ::-webkit-scrollbar-thumb { background: #6e6e6e; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #858585; }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 26, 26, 0.2);
            border-radius: 16px;
        }

        .user-card {
            background: rgba(13, 5, 5, 0.6);
            border: 1px solid rgba(255, 26, 26, 0.15);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .user-card:hover {
            border-color: rgba(255, 26, 26, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 26, 26, 0.1);
        }

        .license-key {
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed rgba(255, 26, 26, 0.3);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .badge-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-pagado { background: rgba(22, 163, 74, 0.2); color: #16a34a; border: 1px solid rgba(22, 163, 74, 0.3); }
        .badge-gratis { background: rgba(74, 222, 128, 0.2); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3); }
        .badge-reclamado { background: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }

        .stat-card {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.1), rgba(153, 27, 27, 0.05));
            border: 1px solid rgba(255, 26, 26, 0.2);
        }
    </style>
</head>
<body class="relative">

    <!-- Header -->
    <header class="bg-[#0d0505]/90 backdrop-blur border-b border-red-900/30 sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-red-500 to-red-800 flex items-center justify-center font-black text-white">P</div>
                <div>
                    <h1 class="text-white font-black tracking-wider text-lg">PAPELETA <span class="text-red-400">STORE</span></h1>
                    <p class="text-gray-400 text-xs">Gestión de Licencias</p>
                </div>
            </div>
            <a href="index.html" class="text-gray-400 hover:text-white text-sm flex items-center gap-2 transition-colors">
                <i class="fas fa-arrow-left"></i> Volver a la Tienda
            </a>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="max-w-7xl mx-auto px-6 py-10">
        
        <!-- Estadísticas -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card rounded-xl p-5">
                <div class="flex items-center gap-3 mb-2">
                    <i class="fas fa-users text-red-400 text-2xl"></i>
                    <span class="text-gray-400 text-sm font-semibold">Total Clientes</span>
                </div>
                <p id="stat-total-clientes" class="text-3xl font-black text-white">0</p>
            </div>
            <div class="stat-card rounded-xl p-5">
                <div class="flex items-center gap-3 mb-2">
                    <i class="fas fa-check-circle text-green-400 text-2xl"></i>
                    <span class="text-gray-400 text-sm font-semibold">Pagos Completados</span>
                </div>
                <p id="stat-pagos" class="text-3xl font-black text-white">0</p>
            </div>
            <div class="stat-card rounded-xl p-5">
                <div class="flex items-center gap-3 mb-2">
                    <i class="fas fa-gift text-blue-400 text-2xl"></i>
                    <span class="text-gray-400 text-sm font-semibold">Productos Gratis</span>
                </div>
                <p id="stat-gratis" class="text-3xl font-black text-white">0</p>
            </div>
            <div class="stat-card rounded-xl p-5">
                <div class="flex items-center gap-3 mb-2">
                    <i class="fas fa-key text-yellow-400 text-2xl"></i>
                    <span class="text-gray-400 text-sm font-semibold">Licencias Activas</span>
                </div>
                <p id="stat-licencias" class="text-3xl font-black text-white">0</p>
            </div>
        </div>

        <!-- Filtros y Búsqueda -->
        <div class="glass-panel p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4 justify-between items-center">
                <div class="flex items-center gap-3 flex-1 w-full">
                    <div class="relative flex-1">
                        <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                        <input type="text" id="search-input" oninput="filterUsers()" 
                            placeholder="Buscar por nombre de usuario o Discord ID..." 
                            class="w-full bg-[#0d0505] border border-red-950/40 rounded-xl pl-12 pr-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-red-500 transition-colors">
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="filterByStatus('all')" class="filter-btn active bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all" data-filter="all">
                        Todos
                    </button>
                    <button onclick="filterByStatus('pagado')" class="filter-btn bg-[#0d0505] border border-red-950/40 text-gray-300 px-4 py-2 rounded-lg text-sm font-semibold hover:border-red-500/50 transition-all" data-filter="pagado">
                        Pagados
                    </button>
                    <button onclick="filterByStatus('gratis')" class="filter-btn bg-[#0d0505] border border-red-950/40 text-gray-300 px-4 py-2 rounded-lg text-sm font-semibold hover:border-red-500/50 transition-all" data-filter="gratis">
                        Gratis
                    </button>
                </div>
            </div>
        </div>

        <!-- Lista de Usuarios -->
        <div id="users-container" class="space-y-4">
            <div class="text-center py-12">
                <i class="fas fa-spinner animate-spin text-red-500 text-3xl mb-3"></i>
                <p class="text-gray-400">Cargando licencias de usuarios...</p>
            </div>
        </div>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBWggE0KFiVZDxwxvmhuWXEKu6bNguV0mM",
            authDomain: "papeletalicencia.firebaseapp.com",
            databaseURL: "https://papeletalicencia-default-rtdb.firebaseio.com",
            projectId: "papeletalicencia",
            storageBucket: "papeletalicencia.firebasestorage.app",
            messagingSenderId: "677208314051",
            appId: "1:677208314051:web:a27c04f31d402e83f29276"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allClientes = [];
        let allLicencias = [];
        let currentFilter = 'all';
        let searchTerm = '';

        async function loadLicenciasData() {
            try {
                // Cargar clientes
                const clientesSnapshot = await db.collection("Clientes").orderBy('date', 'desc').get();
                allClientes = [];
                clientesSnapshot.forEach((doc) => {
                    allClientes.push({ id: doc.id, ...doc.data() });
                });

                // Cargar licencias
                const licenciasSnapshot = await db.collection("Licencias").get();
                allLicencias = [];
                licenciasSnapshot.forEach((doc) => {
                    allLicencias.push({ id: doc.id, ...doc.data() });
                });

                updateStats();
                renderUsers();
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('users-container').innerHTML = `
                    <div class="text-center py-12 text-red-400">
                        <i class="fas fa-exclamation-triangle text-3xl mb-3"></i>
                        <p>Error al cargar los datos</p>
                    </div>`;
            }
        }

        function updateStats() {
            const uniqueClients = new Set(allClientes.map(c => c.discord_id)).size;
            const pagosCompletados = allClientes.filter(c => c.status === 'Pagado').length;
            const productosGratis = allClientes.filter(c => c.total_price === 'Gratis' || c.total_price === 'GRATIS').length;
            
            document.getElementById('stat-total-clientes').textContent = uniqueClients;
            document.getElementById('stat-pagos').textContent = pagosCompletados;
            document.getElementById('stat-gratis').textContent = productosGratis;
            document.getElementById('stat-licencias').textContent = allLicencias.length;
        }

        function filterByStatus(status) {
            currentFilter = status;
            
            // Actualizar botones
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === status) {
                    btn.classList.remove('bg-[#0d0505]', 'text-gray-300');
                    btn.classList.add('bg-red-600', 'text-white');
                } else {
                    btn.classList.add('bg-[#0d0505]', 'text-gray-300');
                    btn.classList.remove('bg-red-600', 'text-white');
                }
            });
            
            renderUsers();
        }

        function filterUsers() {
            searchTerm = document.getElementById('search-input').value.toLowerCase();
            renderUsers();
        }

        function renderUsers() {
            const container = document.getElementById('users-container');
            
            // Filtrar clientes
            let filteredClientes = allClientes.filter(cliente => {
                // Filtro por estado
                if (currentFilter === 'pagado' && cliente.status !== 'Pagado') return false;
                if (currentFilter === 'gratis' && cliente.status !== 'Reclamado Exitosamente') return false;
                
                // Filtro por búsqueda
                if (searchTerm) {
                    const username = (cliente.username || '').toLowerCase();
                    const discordId = (cliente.discord_id || '').toLowerCase();
                    if (!username.includes(searchTerm) && !discordId.includes(searchTerm)) return false;
                }
                
                return true;
            });

            if (filteredClientes.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 glass-panel">
                        <i class="fas fa-inbox text-gray-500 text-4xl mb-3"></i>
                        <p class="text-gray-400">No se encontraron usuarios</p>
                    </div>`;
                return;
            }

            container.innerHTML = filteredClientes.map(cliente => {
                const userLicencias = allLicencias.filter(l => l.discord_id === cliente.discord_id);
                const isGratis = cliente.total_price === 'Gratis' || cliente.total_price === 'GRATIS';
                const statusClass = isGratis ? 'badge-gratis' : (cliente.status === 'Pagado' ? 'badge-pagado' : 'badge-reclamado');
                const statusText = isGratis ? 'GRATIS' : cliente.status;
                
                // Agrupar productos
                const productsList = cliente.products || [];
                
                return `
                <div class="user-card p-6">
                    <div class="flex flex-col md:flex-row gap-6">
                        <!-- Avatar e Info Principal -->
                        <div class="flex items-start gap-4 md:w-1/4">
                            <img src="${cliente.avatar ? `https://cdn.discordapp.com/avatars/${cliente.discord_id}/${cliente.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png'}" 
                                alt="${cliente.username}" 
                                class="w-16 h-16 rounded-full border-2 border-red-500">
                            <div class="flex-1 min-w-0">
                                <h3 class="text-white font-bold text-lg truncate">${escapeHTML(cliente.username)}</h3>
                                <p class="text-gray-500 text-xs font-mono truncate">${cliente.discord_id}</p>
                                <span class="badge-status ${statusClass} mt-2 inline-block">${statusText}</span>
                            </div>
                        </div>

                        <!-- Productos -->
                        <div class="flex-1">
                            <h4 class="text-gray-400 text-sm font-semibold mb-3 flex items-center gap-2">
                                <i class="fas fa-box text-red-400"></i>
                                Productos Adquiridos
                            </h4>
                            <div class="space-y-2">
                                ${productsList.map(prod => `
                                    <div class="bg-[#0d0505] border border-red-950/30 rounded-lg px-4 py-3 flex items-center justify-between">
                                        <div class="flex-1 min-w-0">
                                            <p class="text-white text-sm font-semibold truncate">${escapeHTML(prod.name)}</p>
                                            <p class="text-gray-500 text-xs">${prod.price || 'N/A'}</p>
                                        </div>
                                        <button onclick="showLicensesForProduct('${cliente.discord_id}', '${prod.id}')" 
                                            class="ml-4 text-xs bg-red-600/20 hover:bg-red-600/40 text-red-400 hover:text-red-300 border border-red-600/30 px-3 py-1.5 rounded transition-all">
                                            <i class="fas fa-key mr-1"></i>Ver Licencia
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Fecha y Total -->
                        <div class="md:w-1/5 text-right">
                            <div class="mb-4">
                                <p class="text-gray-500 text-xs mb-1">Total Pagado</p>
                                <p class="text-2xl font-black ${isGratis ? 'text-green-400' : 'text-white'}">
                                    ${cliente.total_price || '$0.00'}
                                </p>
                            </div>
                            <div>
                                <p class="text-gray-500 text-xs mb-1">Fecha</p>
                                <p class="text-gray-300 text-sm">
                                    ${cliente.date ? new Date(cliente.date.seconds * 1000).toLocaleDateString('es-ES') : 'N/A'}
                                </p>
                                <p class="text-gray-500 text-xs">
                                    ${cliente.date ? new Date(cliente.date.seconds * 1000).toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}) : ''}
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Licencias Detalle (Colapsable) -->
                    ${userLicencias.length > 0 ? `
                    <div class="mt-4 pt-4 border-t border-red-950/30">
                        <details class="group">
                            <summary class="flex items-center gap-2 cursor-pointer text-gray-400 hover:text-white transition-colors">
                                <i class="fas fa-chevron-down group-open:rotate-180 transition-transform"></i>
                                <span class="text-sm font-semibold">Ver ${userLicencias.length} licencia${userLicencias.length > 1 ? 's' : ''}</span>
                            </summary>
                            <div class="mt-3 space-y-2 pl-6">
                                ${userLicencias.map(lic => `
                                    <div class="flex items-center gap-3 bg-[#0a0505] border border-red-950/30 rounded-lg px-4 py-2">
                                        <i class="fas fa-key text-yellow-500"></i>
                                        <span class="license-key flex-1">${escapeHTML(lic.key)}</span>
                                        <button onclick="copyToClipboard('${escapeHTML(lic.key)}')" 
                                            class="text-gray-400 hover:text-white transition-colors" title="Copiar">
                                            <i class="fas fa-copy"></i>
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        </details>
                    </div>
                    ` : ''}
                </div>
                `;
            }).join('');
        }

        function showLicensesForProduct(discordId, productId) {
            const userLicenses = allLicencias.filter(l => l.discord_id === discordId && l.product_id === productId);
            
            if (userLicenses.length === 0) {
                alert('No se encontraron licencias para este producto');
                return;
            }
            
            const licenseKeys = userLicenses.map(l => l.key).join('\n');
            alert(`Licencias encontradas:\n\n${licenseKeys}`);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Licencia copiada al portapapeles');
            }).catch(err => {
                console.error('Error al copiar:', err);
                alert('❌ Error al copiar la licencia');
            });
        }

        function escapeHTML(str) {
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        // Cargar datos al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            loadLicenciasData();
        });
    </script>
</body>
</html>
