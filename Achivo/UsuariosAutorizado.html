<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios Autorizados | Papeleta Store</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff1a1a'/%3E%3Cstop offset='1' stop-color='%23cc1b1b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='70' font-family='Arial, sans-serif' font-size='58' font-weight='900' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-dark: #050507;
            --card-bg: rgba(20, 10, 10, 0.6);
            --primary: #ff1a1a;
        }
        
        body {
            background: linear-gradient(135deg, #150a0a 0%, #0a0505 100%);
            color: #f3f4f6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111111; }
        ::-webkit-scrollbar-thumb { background: #6e6e6e; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #858585; }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 26, 26, 0.2);
            border-radius: 16px;
        }

        .user-row {
            background: rgba(13, 5, 5, 0.6);
            border: 1px solid rgba(255, 26, 26, 0.15);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s ease;
        }
        .user-row:hover {
            border-color: rgba(255, 26, 26, 0.4);
            transform: translateX(4px);
        }

        /* Badges de Rol */
        .role-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .role-admin { 
            background: rgba(220, 38, 38, 0.2); 
            color: #dc2626; 
            border: 1px solid rgba(220, 38, 38, 0.4);
        }
        .role-mod { 
            background: rgba(245, 158, 11, 0.2); 
            color: #f59e0b; 
            border: 1px solid rgba(245, 158, 11, 0.4);
        }
        .role-user { 
            background: rgba(107, 114, 128, 0.2); 
            color: #6b7280; 
            border: 1px solid rgba(107, 114, 128, 0.3);
        }
        /* Estilo dinámico para roles personalizados */
        .role-custom {
            border: 1px solid;
        }

        /* Botones de Rol Base */
        .btn-role {
            transition: all 0.2s ease;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 8px;
            position: relative;
        }
        .btn-role-admin {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #dc2626;
        }
        .btn-role-admin:hover:not(:disabled) { background: rgba(220, 38, 38, 0.3); border-color: rgba(220, 38, 38, 0.6); }
        
        .btn-role-mod {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #f59e0b;
        }
        .btn-role-mod:hover:not(:disabled) { background: rgba(245, 158, 11, 0.3); border-color: rgba(245, 158, 11, 0.6); }
        
        .btn-role-user {
            background: rgba(107, 114, 128, 0.1);
            border: 1px solid rgba(107, 114, 128, 0.3);
            color: #6b7280;
        }
        .btn-role-user:hover:not(:disabled) { background: rgba(107, 114, 128, 0.3); border-color: rgba(107, 114, 128, 0.6); }

        /* Dropdown de Roles Personalizados */
        .custom-roles-dropdown {
            position: absolute;
            bottom: 100%;
            left: 0;
            margin-bottom: 8px;
            background: #1a0a0a;
            border: 1px solid rgba(255, 26, 26, 0.3);
            border-radius: 10px;
            padding: 6px;
            min-width: 180px;
            z-index: 50;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
            display: none;
        }
        .custom-roles-dropdown.active { display: block; animation: slideUp 0.2s ease; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-role-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 13px;
            color: #e5e7eb;
        }
        .custom-role-option:hover { background: rgba(255, 255, 255, 0.05); }
        
        .role-color-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.1), rgba(153, 27, 27, 0.05));
            border: 1px solid rgba(255, 26, 26, 0.2);
        }
    </style>
</head>
<body class="relative">

    <!-- Header -->
    <header class="bg-[#0d0505]/90 backdrop-blur border-b border-red-900/30 sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-red-500 to-red-800 flex items-center justify-center font-black text-white">P</div>
                <div>
                    <h1 class="text-white font-black tracking-wider text-lg">PAPELETA <span class="text-red-400">STORE</span></h1>
                    <p class="text-gray-400 text-xs">Gestión de Roles y Permisos</p>
                </div>
            </div>
            <a href="index.html" class="text-gray-400 hover:text-white text-sm flex items-center gap-2 transition-colors">
                <i class="fas fa-arrow-left"></i> Volver a la Tienda
            </a>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="max-w-7xl mx-auto px-6 py-10">
        
        <!-- Estadísticas de Roles -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="stat-card rounded-xl p-5">
                <div class="flex items-center gap-3 mb-2">
                    <i class="fas fa-shield-alt text-red-500 text-2xl"></i>
                    <span class="text-gray-400 text-sm font-semibold">Administradores</span>
                </div>
                <p id="stat-admins" class="text-3xl font-black text-white">0</p>
            </div>
            <div class="stat-card rounded-xl p-5">
                <div class="flex items-center gap-3 mb-2">
                    <i class="fas fa-user-shield text-yellow-500 text-2xl"></i>
                    <span class="text-gray-400 text-sm font-semibold">Moderadores</span>
                </div>
                <p id="stat-mods" class="text-3xl font-black text-white">0</p>
            </div>
            <div class="stat-card rounded-xl p-5">
                <div class="flex items-center gap-3 mb-2">
                    <i class="fas fa-users text-gray-400 text-2xl"></i>
                    <span class="text-gray-400 text-sm font-semibold">Otros Roles / Usuarios</span>
                </div>
                <p id="stat-others" class="text-3xl font-black text-white">0</p>
            </div>
        </div>

        <!-- Filtros -->
        <div class="glass-panel p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4 justify-between items-center">
                <div class="relative flex-1 w-full">
                    <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="search-input" oninput="filterUsers()" 
                        placeholder="Buscar usuario por nombre o Discord ID..." 
                        class="w-full bg-[#0d0505] border border-red-950/40 rounded-xl pl-12 pr-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-red-500 transition-colors">
                </div>
                <div class="flex gap-2">
                    <button onclick="filterByRole('all')" class="role-filter-btn active bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all" data-role="all">Todos</button>
                    <button onclick="filterByRole('admin')" class="role-filter-btn bg-[#0d0505] border border-red-950/40 text-gray-300 px-4 py-2 rounded-lg text-sm font-semibold hover:border-red-500/50 transition-all" data-role="admin">Admins</button>
                    <button onclick="filterByRole('mod')" class="role-filter-btn bg-[#0d0505] border border-red-950/40 text-gray-300 px-4 py-2 rounded-lg text-sm font-semibold hover:border-red-500/50 transition-all" data-role="mod">Mods</button>
                    <button onclick="filterByRole('custom')" class="role-filter-btn bg-[#0d0505] border border-red-950/40 text-gray-300 px-4 py-2 rounded-lg text-sm font-semibold hover:border-red-500/50 transition-all" data-role="custom">Personalizados</button>
                </div>
            </div>
        </div>

        <!-- Lista de Usuarios -->
        <div class="glass-panel p-6">
            <h3 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                <i class="fas fa-users-cog text-red-500"></i>
                Gestión de Usuarios y Roles
            </h3>
            
            <div id="users-container" class="space-y-3">
                <div class="text-center py-12 text-gray-400">
                    <i class="fas fa-spinner animate-spin text-3xl mb-3"></i>
                    <p>Cargando usuarios...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBWggE0KFiVZDxwxvmhuWXEKu6bNguV0mM",
            authDomain: "papeletalicencia.firebaseapp.com",
            databaseURL: "https://papeletalicencia-default-rtdb.firebaseio.com",
            projectId: "papeletalicencia",
            storageBucket: "papeletalicencia.firebasestorage.app",
            messagingSenderId: "677208314051",
            appId: "1:677208314051:web:a27c04f31d402e83f29276"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // IDs de administradores hardcodeados
        const ADMIN_DISCORD_IDS = ['890526767608127489'];
        const ADMIN_DISCORD_USERNAMES = ['papeleta'];

        let allUsers = [];
        let customRoles = [];
        let currentRoleFilter = 'all';
        let searchTerm = '';
        let activeDropdownId = null; // Para cerrar dropdowns al abrir otro

        async function loadUsers() {
            try {
                // 1. Cargar Roles Personalizados
                const savedRoles = localStorage.getItem('papeleta_custom_roles');
                customRoles = savedRoles ? JSON.parse(savedRoles) : [];

                // 2. Cargar Usuarios de Firestore
                const usersSnapshot = await db.collection("UsuariosRegistrados").get();
                const firestoreUsers = [];
                usersSnapshot.forEach((doc) => firestoreUsers.push(doc.data()));

                // 3. Cargar Usuarios Locales (con roles asignados)
                const localUsers = JSON.parse(localStorage.getItem('papeleta_all_users') || '[]');

                // 4. Combinar datos
                const userMap = new Map();
                
                firestoreUsers.forEach(user => {
                    userMap.set(user.discord_id, { ...user, role: 'user' });
                });

                localUsers.forEach(localUser => {
                    if (userMap.has(localUser.discord_id)) {
                        const existing = userMap.get(localUser.discord_id);
                        if (localUser.role) existing.role = localUser.role;
                    } else {
                        userMap.set(localUser.discord_id, localUser);
                    }
                });

                // 5. Aplicar admins hardcodeados
                allUsers = Array.from(userMap.values()).map(user => {
                    if (isAdminHardcoded(user)) user.role = 'admin';
                    return user;
                });

                updateStats();
                renderUsers();
            } catch (error) {
                console.error("Error loading users:", error);
                document.getElementById('users-container').innerHTML = `
                    <div class="text-center py-12 text-red-400">
                        <i class="fas fa-exclamation-triangle text-3xl mb-3"></i>
                        <p>Error al cargar usuarios</p>
                    </div>`;
            }
        }

        function isAdminHardcoded(user) {
            if (!user) return false;
            if (ADMIN_DISCORD_IDS.includes(user.discord_id)) return true;
            if (user.username && ADMIN_DISCORD_USERNAMES.includes(user.username.toLowerCase())) return true;
            return false;
        }

        function getCustomRoleData(roleName) {
            return customRoles.find(r => r.name.toLowerCase() === roleName.toLowerCase());
        }

        function updateStats() {
            const admins = allUsers.filter(u => u.role === 'admin').length;
            const mods = allUsers.filter(u => u.role === 'mod').length;
            // "Otros" incluye usuarios normales Y roles personalizados
            const others = allUsers.filter(u => !['admin', 'mod'].includes(u.role)).length;

            document.getElementById('stat-admins').textContent = admins;
            document.getElementById('stat-mods').textContent = mods;
            document.getElementById('stat-others').textContent = others;
        }

        function filterByRole(role) {
            currentRoleFilter = role;
            document.querySelectorAll('.role-filter-btn').forEach(btn => {
                if (btn.dataset.role === role) {
                    btn.classList.remove('bg-[#0d0505]', 'text-gray-300');
                    btn.classList.add('bg-red-600', 'text-white');
                } else {
                    btn.classList.add('bg-[#0d0505]', 'text-gray-300');
                    btn.classList.remove('bg-red-600', 'text-white');
                }
            });
            renderUsers();
        }

        function filterUsers() {
            searchTerm = document.getElementById('search-input').value.toLowerCase();
            renderUsers();
        }

        function renderUsers() {
            const container = document.getElementById('users-container');
            
            let filteredUsers = allUsers.filter(user => {
                const userRole = user.role || 'user';
                
                // Filtro por rol
                if (currentRoleFilter === 'admin' && userRole !== 'admin') return false;
                if (currentRoleFilter === 'mod' && userRole !== 'mod') return false;
                if (currentRoleFilter === 'custom' && ['admin', 'mod', 'user'].includes(userRole)) return false;
                
                // Filtro por búsqueda
                if (searchTerm) {
                    const username = (user.username || '').toLowerCase();
                    const discordId = (user.discord_id || '').toLowerCase();
                    if (!username.includes(searchTerm) && !discordId.includes(searchTerm)) return false;
                }
                
                return true;
            });

            // Ordenar: Admins > Mods > Custom > Users
            filteredUsers.sort((a, b) => {
                const getOrder = (r) => {
                    if (r === 'admin') return 0;
                    if (r === 'mod') return 1;
                    if (getCustomRoleData(r)) return 2;
                    return 3;
                };
                return getOrder(a.role) - getOrder(b.role);
            });

            if (filteredUsers.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-500"><i class="fas fa-user-slash text-4xl mb-3"></i><p>No se encontraron usuarios</p></div>`;
                return;
            }

            container.innerHTML = filteredUsers.map(user => {
                const userRole = user.role || 'user';
                const isAdmin = isAdminHardcoded(user);
                const customRole = getCustomRoleData(userRole);
                
                // Determinar clase y texto del badge
                let roleClass = 'role-user';
                let roleText = 'USUARIO';
                let badgeStyle = '';

                if (isAdmin) {
                    roleClass = 'role-admin';
                    roleText = 'ADMIN';
                } else if (userRole === 'mod') {
                    roleClass = 'role-mod';
                    roleText = 'MOD';
                } else if (customRole) {
                    roleClass = 'role-custom';
                    roleText = customRole.name.toUpperCase();
                    // Aplicar color personalizado inline
                    badgeStyle = `background-color: ${customRole.color}20; color: ${customRole.color}; border-color: ${customRole.color}60;`;
                }
                
                return `
                <div class="user-row flex flex-col md:flex-row items-start md:items-center gap-4">
                    <!-- Avatar e Info -->
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <img src="${user.avatar ? `https://cdn.discordapp.com/avatars/${user.discord_id}/${user.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png'}" 
                            alt="${user.username}" 
                            class="w-12 h-12 rounded-full border-2 ${isAdmin ? 'border-red-500' : (customRole ? 'border-opacity-50' : 'border-gray-600')}"
                            style="${customRole ? `border-color: ${customRole.color}` : ''}">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <h4 class="text-white font-bold truncate">${escapeHTML(user.username || 'Usuario sin nombre')}</h4>
                                ${isAdmin ? '<i class="fas fa-crown text-red-500" title="Admin Principal"></i>' : ''}
                            </div>
                            <p class="text-gray-500 text-xs font-mono truncate">${user.discord_id}</p>
                        </div>
                    </div>

                    <!-- Rol Actual -->
                    <div class="flex items-center gap-2">
                        <span class="role-badge ${roleClass}" style="${badgeStyle}">${roleText}</span>
                    </div>

                    <!-- Botones de Acción -->
                    <div class="flex gap-2 flex-wrap relative">
                        ${!isAdmin ? `
                            <button onclick="setRole('${user.discord_id}', 'admin')" 
                                class="btn-role btn-role-admin ${userRole === 'admin' ? 'opacity-50 cursor-not-allowed' : ''}"
                                ${userRole === 'admin' ? 'disabled' : ''}>
                                <i class="fas fa-shield-alt mr-1"></i>Admin
                            </button>
                            <button onclick="setRole('${user.discord_id}', 'mod')" 
                                class="btn-role btn-role-mod ${userRole === 'mod' ? 'opacity-50 cursor-not-allowed' : ''}"
                                ${userRole === 'mod' ? 'disabled' : ''}>
                                <i class="fas fa-user-shield mr-1"></i>Mod
                            </button>
                            
                            <!-- Dropdown de Roles Personalizados -->
                            ${customRoles.length > 0 ? `
                            <div class="relative">
                                <button onclick="toggleCustomRoles('${user.discord_id}', event)" 
                                    class="btn-role bg-[#0d0505] border border-red-950/40 text-gray-300 hover:border-red-500/50 hover:text-white">
                                    <i class="fas fa-plus mr-1"></i>Más Roles...
                                </button>
                                
                                <div id="dropdown-${user.discord_id}" class="custom-roles-dropdown">
                                    ${customRoles.map(role => `
                                        <div class="custom-role-option" onclick="setRole('${user.discord_id}', '${escapeHTML(role.name)}')">
                                            <div class="role-color-dot" style="background-color: ${role.color}"></div>
                                            <span>${escapeHTML(role.name)}</span>
                                            ${userRole.toLowerCase() === role.name.toLowerCase() ? '<i class="fas fa-check ml-auto text-green-400"></i>' : ''}
                                        </div>
                                    `).join('')}
                                    <div class="border-t border-white/10 my-1"></div>
                                    <div class="custom-role-option" onclick="setRole('${user.discord_id}', 'user')">
                                        <div class="role-color-dot" style="background-color: #6b7280"></div>
                                        <span>Quitar Rol (Usuario)</span>
                                    </div>
                                </div>
                            </div>
                            ` : ''}

                            <button onclick="setRole('${user.discord_id}', 'user')" 
                                class="btn-role btn-role-user ${(!customRoles.length && userRole === 'user') ? 'opacity-50 cursor-not-allowed' : ''}"
                                ${(!customRoles.length && userRole === 'user') ? 'disabled' : ''}>
                                <i class="fas fa-user mr-1"></i>Usuario
                            </button>
                        ` : '<span class="text-gray-500 text-xs italic">Rol fijo</span>'}
                    </div>
                </div>
                `;
            }).join('');
        }

        function toggleCustomRoles(userId, event) {
            event.stopPropagation();
            
            // Cerrar otros dropdowns abiertos
            if (activeDropdownId && activeDropdownId !== userId) {
                const prev = document.getElementById(`dropdown-${activeDropdownId}`);
                if (prev) prev.classList.remove('active');
            }

            const dropdown = document.getElementById(`dropdown-${userId}`);
            if (dropdown) {
                dropdown.classList.toggle('active');
                activeDropdownId = dropdown.classList.contains('active') ? userId : null;
            }
        }

        // Cerrar dropdowns al hacer click fuera
        document.addEventListener('click', () => {
            if (activeDropdownId) {
                const dropdown = document.getElementById(`dropdown-${activeDropdownId}`);
                if (dropdown) dropdown.classList.remove('active');
                activeDropdownId = null;
            }
        });

        async function setRole(discordId, newRole) {
            const user = allUsers.find(u => u.discord_id === discordId);
            if (!user) return;

            if (isAdminHardcoded(user)) {
                alert('⚠️ No se puede cambiar el rol de un administrador principal');
                return;
            }

            const confirmMsg = `¿Estás seguro de cambiar el rol de ${user.username} a "${newRole}"?`;
            if (!confirm(confirmMsg)) return;

            try {
                // Actualizar en localStorage
                let localUsers = JSON.parse(localStorage.getItem('papeleta_all_users') || '[]');
                const userIndex = localUsers.findIndex(u => u.discord_id === discordId);
                
                if (userIndex >= 0) {
                    localUsers[userIndex].role = newRole;
                } else {
                    localUsers.push({
                        discord_id: discordId,
                        username: user.username,
                        avatar: user.avatar,
                        role: newRole,
                        last_login: new Date().toISOString()
                    });
                }
                
                localStorage.setItem('papeleta_all_users', JSON.stringify(localUsers));

                // Actualizar en memoria
                user.role = newRole;

                // Cerrar dropdown si estaba abierto
                if (activeDropdownId === discordId) {
                    const dropdown = document.getElementById(`dropdown-${discordId}`);
                    if (dropdown) dropdown.classList.remove('active');
                    activeDropdownId = null;
                }

                // Actualizar UI
                updateStats();
                renderUsers();

                alert(`✅ Rol de ${user.username} actualizado a "${newRole}"`);

            } catch (error) {
                console.error("Error setting role:", error);
                alert('❌ Error al actualizar el rol: ' + error.message);
            }
        }

        function escapeHTML(str) {
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        // Cargar usuarios al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            loadUsers();
        });
    </script>
</body>
</html>
