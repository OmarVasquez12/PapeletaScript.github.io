<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Producto | Papeleta Store</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff1a1a'/%3E%3Cstop offset='1' stop-color='%23cc1b1b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='70' font-family='Arial, sans-serif' font-size='58' font-weight='900' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-dark: #050507;
            --card-bg: rgba(20, 10, 10, 0.6);
            --primary: #ff1a1a;
            --primary-dark: #991b1b;
        }
        
        body {
            background: linear-gradient(135deg, #150a0a 0%, #0a0505 100%);
            color: #f3f4f6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111111; }
        ::-webkit-scrollbar-thumb { background: #6e6e6e; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #858585; }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 26, 26, 0.2);
            border-radius: 16px;
        }

        .btn-primary {
            background: linear-gradient(to right, #dc2626, #991b1b);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.5);
        }

        .preview-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid rgba(220, 38, 38, 0.3);
        }
        .preview-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .preview-item .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(220, 38, 38, 0.9);
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .preview-item .remove-btn:hover {
            background: rgba(220, 38, 38, 1);
        }

        .multiple-preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body class="relative">

    <!-- Header -->
    <header class="bg-[#0d0505]/90 backdrop-blur border-b border-red-900/30 sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-red-500 to-red-800 flex items-center justify-center font-black text-white">P</div>
                <div>
                    <h1 class="text-white font-black tracking-wider text-lg">PAPELETA <span class="text-red-400">STORE</span></h1>
                    <p class="text-gray-400 text-xs">Panel de Administración</p>
                </div>
            </div>
            <a href="index.html" class="text-gray-400 hover:text-white text-sm flex items-center gap-2 transition-colors">
                <i class="fas fa-arrow-left"></i> Volver a la Tienda
            </a>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="max-w-5xl mx-auto px-6 py-10">
        
        <div class="glass-panel p-8 mb-8">
            <h2 class="text-3xl font-black text-white mb-2 flex items-center gap-3">
                <i class="fas fa-cloud-upload-alt text-red-500"></i>
                Subir Nuevo Producto
            </h2>
            <p class="text-gray-400 text-sm mb-6">Completa el formulario para agregar un producto a la tienda</p>

            <form id="product-form" onsubmit="handleProductSubmit(event)" class="space-y-6">
                
                <!-- Nombre -->
                <div>
                    <label class="block text-gray-300 text-sm font-semibold mb-2">Nombre del Producto *</label>
                    <input type="text" id="prod-name" required 
                        class="w-full bg-[#0d0505] border border-red-950/40 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-red-500 transition-colors" 
                        placeholder="Ej: Script de Inventario Premium">
                </div>

                <!-- Precio y Categoría -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-300 text-sm font-semibold mb-2">Precio (USD) *</label>
                        <input type="number" id="prod-price" required step="0.01" min="0" 
                            class="w-full bg-[#0d0505] border border-red-950/40 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-red-500 transition-colors" 
                            placeholder="10.00">
                    </div>
                    <div>
                        <label class="block text-gray-300 text-sm font-semibold mb-2">Categoría</label>
                        <select id="prod-category" 
                            class="w-full bg-[#0d0505] border border-red-950/40 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-red-500 transition-colors">
                            <option value="Scripts">Scripts</option>
                            <option value="Modelajes">Modelajes</option>
                            <option value="Mappings">Mappings</option>
                            <option value="Webs">Sitios Web</option>
                            <option value="Bots">Bots Discord</option>
                            <option value="Otros">Otros</option>
                        </select>
                    </div>
                </div>

                <!-- Descripción -->
                <div>
                    <label class="block text-gray-300 text-sm font-semibold mb-2">Descripción/Detalle *</label>
                    <textarea id="prod-description" required rows="4" 
                        class="w-full bg-[#0d0505] border border-red-950/40 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-red-500 transition-colors" 
                        placeholder="Describe las características del producto, qué incluye, requisitos, etc..."></textarea>
                </div>

                <!-- Imágenes Múltiples -->
                <div>
                    <label class="block text-gray-300 text-sm font-semibold mb-2">Fotos del Producto (Múltiples) *</label>
                    <div class="border-2 border-dashed border-red-900/40 rounded-xl p-6 text-center hover:border-red-500/50 transition-colors bg-[#0d0505]/50">
                        <input type="file" id="prod-images" accept="image/*" multiple required 
                            onchange="previewMultipleImages(this)" class="hidden">
                        <label for="prod-images" class="cursor-pointer block">
                            <i class="fas fa-images text-4xl text-red-400 mb-3"></i>
                            <p class="text-gray-300 font-semibold">Haz clic para subir imágenes</p>
                            <p class="text-gray-500 text-xs mt-1">Puedes seleccionar varias imágenes a la vez (máx. 800x600 recomendado)</p>
                        </label>
                        <div id="multiple-images-preview" class="multiple-preview-container"></div>
                    </div>
                </div>

                <!-- Archivo Descargable -->
                <div>
                    <label class="block text-gray-300 text-sm font-semibold mb-2">Archivo del Producto (Zip/Rar/Lua) *</label>
                    <div class="border-2 border-dashed border-red-900/40 rounded-xl p-6 text-center hover:border-red-500/50 transition-colors bg-[#0d0505]/50">
                        <input type="file" id="prod-file" accept=".zip,.rar,.7z,.lua,.txt" required 
                            onchange="updateFileName(this)" class="hidden">
                        <label for="prod-file" class="cursor-pointer block">
                            <i class="fas fa-file-archive text-4xl text-red-400 mb-3"></i>
                            <p id="file-label-text" class="text-gray-300 font-semibold">Haz clic para subir el archivo descargable</p>
                            <p class="text-gray-500 text-xs mt-1">El usuario podrá descargar este archivo tras comprarlo</p>
                        </label>
                    </div>
                </div>

                <!-- Botón Submit -->
                <div class="pt-4">
                    <button type="submit" 
                        class="btn-primary w-full py-4 rounded-xl text-white font-bold text-lg flex items-center justify-center gap-3">
                        <i class="fas fa-plus-circle"></i>
                        Agregar Producto a la Tienda
                    </button>
                </div>
            </form>
        </div>

        <!-- Lista de Productos Existentes -->
        <div class="glass-panel p-8">
            <h3 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                <i class="fas fa-list text-red-500"></i>
                Productos en la Tienda
            </h3>
            <div id="admin-products-list" class="space-y-3">
                <p class="text-gray-500 text-sm text-center py-8">
                    <i class="fas fa-spinner animate-spin mr-2"></i>Cargando productos...
                </p>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBWggE0KFiVZDxwxvmhuWXEKu6bNguV0mM",
            authDomain: "papeletalicencia.firebaseapp.com",
            databaseURL: "https://papeletalicencia-default-rtdb.firebaseio.com",
            projectId: "papeletalicencia",
            storageBucket: "papeletalicencia.firebasestorage.app",
            messagingSenderId: "677208314051",
            appId: "1:677208314051:web:a27c04f31d402e83f29276"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let tempImages = [];
        let allProducts = [];

        // Preview de múltiples imágenes
        function previewMultipleImages(input) {
            const previewContainer = document.getElementById('multiple-images-preview');
            previewContainer.innerHTML = '';
            tempImages = [];
            
            if (input.files && input.files.length > 0) {
                Array.from(input.files).forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        tempImages.push({ file: file, dataUrl: e.target.result });
                        
                        const div = document.createElement('div');
                        div.className = 'preview-item';
                        div.innerHTML = `
                            <img src="${e.target.result}" alt="Preview ${index + 1}">
                            <button type="button" class="remove-btn" onclick="removeImage(${index})">
                                <i class="fas fa-times"></i>
                            </button>
                        `;
                        previewContainer.appendChild(div);
                    };
                    reader.readAsDataURL(file);
                });
            }
        }

        function removeImage(index) {
            tempImages.splice(index, 1);
            const previewContainer = document.getElementById('multiple-images-preview');
            previewContainer.innerHTML = '';
            
            tempImages.forEach((img, idx) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `
                    <img src="${img.dataUrl}" alt="Preview ${idx + 1}">
                    <button type="button" class="remove-btn" onclick="removeImage(${idx})">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                previewContainer.appendChild(div);
            });
        }

        function updateFileName(input) {
            const label = document.getElementById('file-label-text');
            if (input.files && input.files[0]) {
                label.innerText = input.files[0].name;
                label.classList.add('text-white', 'font-bold');
            }
        }

        function resizeImage(file, maxWidth = 800, maxHeight = 600) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round((height * maxWidth) / width);
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round((width * maxHeight) / height);
                                height = maxHeight;
                            }
                        }
                        
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                        resolve(dataUrl);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function handleProductSubmit(e) {
            e.preventDefault();
            
            const name = document.getElementById('prod-name').value;
            const price = parseFloat(document.getElementById('prod-price').value);
            const category = document.getElementById('prod-category').value;
            const description = document.getElementById('prod-description').value;
            const downloadFile = document.getElementById('prod-file').files[0];
            
            if (tempImages.length === 0) {
                alert('Por favor selecciona al menos una imagen');
                return;
            }
            
            if (!downloadFile) {
                alert('Por favor selecciona el archivo de descarga');
                return;
            }
            
            try {
                // Redimensionar todas las imágenes
                const resizedImages = [];
                for (let i = 0; i < tempImages.length; i++) {
                    const resized = await resizeImage(tempImages[i].file);
                    resizedImages.push(resized);
                }
                
                const fileBase64 = await fileToBase64(downloadFile);
                
                const newProduct = {
                    id: 'prod_' + Date.now(),
                    name: name,
                    price: price,
                    category: category,
                    description: description,
                    image_url: resizedImages[0],
                    images: resizedImages,
                    file_data: fileBase64,
                    file_name: downloadFile.name,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                await db.collection("Productos").doc(newProduct.id).set(newProduct);
                
                alert('✅ Producto guardado exitosamente en la tienda');
                
                // Reset form
                document.getElementById('product-form').reset();
                document.getElementById('multiple-images-preview').innerHTML = '';
                document.getElementById('file-label-text').innerText = 'Haz clic para subir el archivo descargable';
                document.getElementById('file-label-text').classList.remove('text-white', 'font-bold');
                tempImages = [];
                
                // Recargar lista
                loadProducts();
                
            } catch (error) {
                console.error(error);
                alert('❌ Error al guardar: ' + error.message);
            }
        }

        async function loadProducts() {
            const container = document.getElementById('admin-products-list');
            
            try {
                const snapshot = await db.collection("Productos").get();
                allProducts = [];
                snapshot.forEach((doc) => {
                    allProducts.push(doc.data());
                });
                
                if (allProducts.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-sm text-center py-8">No hay productos en la tienda aún.</p>';
                    return;
                }
                
                container.innerHTML = allProducts.map(p => `
                    <div class="flex items-center gap-4 bg-[#0d0505] border border-red-950/40 rounded-xl p-4 hover:border-red-500/30 transition-colors">
                        <img src="${p.image_url}" class="w-16 h-16 rounded-lg object-cover border border-red-900/30">
                        <div class="flex-grow min-w-0">
                            <p class="text-white font-semibold truncate">${escapeHTML(p.name)}</p>
                            <p class="${Number(p.price) === 0 ? 'text-green-400' : 'text-red-400'} text-sm font-bold">
                                ${Number(p.price) === 0 ? 'GRATIS' : '$' + Number(p.price).toFixed(2)}
                            </p>
                            <p class="text-gray-500 text-xs truncate">
                                <i class="fas fa-tag mr-1"></i>${escapeHTML(p.category || 'Sin categoría')}
                            </p>
                        </div>
                        <button onclick="deleteProduct('${p.id}')" 
                            class="text-red-400 hover:text-red-300 w-10 h-10 rounded-lg hover:bg-red-950/30 flex items-center justify-center transition-all">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error(error);
                container.innerHTML = '<p class="text-red-400 text-sm text-center py-8">Error al cargar productos</p>';
            }
        }

        async function deleteProduct(id) {
            if (!confirm('¿Estás seguro de eliminar este producto de la tienda?')) return;
            
            try {
                await db.collection("Productos").doc(id).delete();
                alert('✅ Producto eliminado correctamente');
                loadProducts();
            } catch (error) {
                console.error(error);
                alert('❌ Error al eliminar: ' + error.message);
            }
        }

        function escapeHTML(str) {
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        // Cargar productos al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
        });
    </script>
</body>
</html>
