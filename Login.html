<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Papeleta Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a0a0a 0%, #0d0505 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Network Background Animation */
        #network-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.3;
            pointer-events: none;
        }

        .modal-container {
            position: relative;
            z-index: 10;
            background: rgba(13, 5, 5, 0.95);
            border: 1px solid rgba(255, 26, 26, 0.3);
            border-radius: 16px; /* Bordes un poco más cerrados */
            padding: 2rem 1.5rem; /* Menos padding interno */
            max-width: 360px; /* ANCHO REDUCIDO */
            width: 90%;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 26, 26, 0.15), 
                        inset 0 0 40px rgba(255, 26, 26, 0.05);
            backdrop-filter: blur(10px);
        }

        /* Back Button (Top Left) */
        .back-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            background: transparent;
            border: none;
            color: #9496a1;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: #ffffff;
            transform: translateX(-2px);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: #6b7280;
            font-size: 1.2rem;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 26, 26, 0.1);
            color: #ff1a1a;
            transform: rotate(90deg);
        }

        .logo-container {
            margin-bottom: 1rem;
        }

        .logo {
            width: 70px; /* Logo más pequeño */
            height: 70px;
            background: linear-gradient(135deg, #ff1a1a 0%, #cc1b1b 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 8px 20px rgba(255, 26, 26, 0.3),
                        0 0 40px rgba(255, 26, 26, 0.15);
            font-size: 2.2rem;
            font-weight: 900;
            color: white;
            animation: logoPulse 2s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .store-title {
            font-size: 1.8rem; /* Título más pequeño */
            font-weight: 900;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .store-title .papeleta {
            color: #ffffff;
        }

        .store-title .store {
            color: #ff4444;
            text-shadow: 0 0 15px rgba(255, 26, 26, 0.6),
                         0 0 30px rgba(204, 27, 27, 0.3);
        }

        .subtitle {
            color: #9496a1;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 1.2rem;
        }

        /* Feature Badges (Seguro, Rápido, Oficial) - Compactos */
        .feature-badges {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .feature-badge {
            background: rgba(255, 26, 26, 0.08);
            border: 1px solid rgba(255, 26, 26, 0.15);
            border-radius: 10px;
            padding: 0.6rem 0.8rem;
            min-width: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.3s ease;
        }

        .feature-badge:hover {
            background: rgba(255, 26, 26, 0.12);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 26, 26, 0.08);
        }

        .feature-badge i {
            font-size: 1.3rem;
            color: #38bdf8;
        }

        .feature-badge span {
            font-weight: 600;
            color: #e5e7eb;
            font-size: 0.75rem;
        }

        .discord-btn {
            width: 100%;
            background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(88, 101, 242, 0.3);
            text-decoration: none;
        }

        .discord-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(88, 101, 242, 0.5);
            background: linear-gradient(135deg, #6b75ff 0%, #5865F2 100%);
        }

        .discord-btn:active {
            transform: translateY(0);
        }

        .discord-btn i {
            font-size: 1.2rem;
        }

        .security-note {
            margin-top: 1rem;
            color: #6b7280;
            font-size: 0.75rem;
            line-height: 1.4;
        }

        .security-note i {
            color: #10b981;
            margin-right: 0.4rem;
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <canvas id="network-bg"></canvas>

    <div class="modal-container">
        <!-- Botón Volver a la web -->
        <button class="back-btn" onclick="goBack()" title="Volver a la web">
            <i class="fas fa-arrow-left"></i> Volver
        </button>

        <!-- Botón Cerrar -->
        <button class="close-btn" onclick="window.close()" title="Cerrar">
            <i class="fas fa-times"></i>
        </button>

        <div class="logo-container">
            <div class="logo">P</div>
        </div>

        <h1 class="store-title">
            <span class="papeleta">PAPELETA</span> 
            <span class="store">STORE</span>
        </h1>

        <p class="subtitle">
            Inicia sesión para comprar y descargar archivos.
        </p>

        <!-- Badges Seguro, Rápido, Oficial -->
        <div class="feature-badges">
            <div class="feature-badge">
                <i class="fas fa-shield-alt"></i>
                <span>Seguro</span>
            </div>
            <div class="feature-badge">
                <i class="fas fa-bolt"></i>
                <span>Rápido</span>
            </div>
            <div class="feature-badge">
                <i class="fas fa-cog"></i>
                <span>Oficial</span>
            </div>
        </div>

        <a href="#" class="discord-btn" onclick="handleDiscordLogin(event)">
            <i class="fab fa-discord"></i>
            <span>Iniciar Sesión con Discord</span>
        </a>

        <p class="security-note">
            <i class="fas fa-shield-alt"></i>
            Tus datos están seguros. Solo usamos tu ID.
        </p>
    </div>

    <script>
        // Configuration
        const CLIENT_ID = '1213866547181780992';
        const REDIRECT_URI = 'https://papeleta-script-github-io.vercel.app';

        // Volver a la web
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/';
            }
        }

        // Handle Discord Login
        function handleDiscordLogin(e) {
            e.preventDefault();
            
            const btn = document.querySelector('.discord-btn');
            const originalContent = btn.innerHTML;
            
            // Show loading state
            btn.innerHTML = '<span class="loading"></span><span>Conectando...</span>';
            btn.style.opacity = '0.8';
            
            // Redirect to Discord OAuth
            setTimeout(() => {
                const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify%20email`;
                window.location.href = url;
            }, 500);
        }

        // Network Background Animation
        function initNetworkBg() {
            const canvas = document.getElementById('network-bg');
            const ctx = canvas.getContext('2d');
            let w, h, points;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            points = Array.from({ length: 45 }, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3
            }));

            function tick() {
                ctx.clearRect(0, 0, w, h);
                points.forEach(p => {
                    p.x += p.vx; 
                    p.y += p.vy;
                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;
                });

                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        const dx = points[i].x - points[j].x;
                        const dy = points[i].y - points[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            ctx.strokeStyle = `rgba(255,26,26,${1 - dist / 150})`;
                            ctx.lineWidth = 0.6;
                            ctx.beginPath();
                            ctx.moveTo(points[i].x, points[i].y);
                            ctx.lineTo(points[j].x, points[j].y);
                            ctx.stroke();
                        }
                    }
                    ctx.fillStyle = 'rgba(255,26,26,0.8)';
                    ctx.beginPath();
                    ctx.arc(points[i].x, points[i].y, 1.8, 0, Math.PI * 2);
                    ctx.fill();
                }
                requestAnimationFrame(tick);
            }
            tick();
        }

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                window.close();
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', initNetworkBg);

        // Check if opened as popup
        if (window.opener) {
            window.onbeforeunload = () => {
                // Optional: notify opener that login was cancelled
            };
        }
    </script>
</body>
</html>
