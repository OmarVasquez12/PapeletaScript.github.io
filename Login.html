<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Pixel Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        #network-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.2;
            pointer-events: none;
        }

        .modal-container {
            position: relative;
            z-index: 10;
            background: #0f0f11;
            border: 1px solid #27272a;
            border-radius: 24px;
            padding: 3rem 2rem;
            max-width: 500px;
            width: 95%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .logo-wrapper {
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
        }

        .pixel-logo {
            width: 80px;
            height: 80px;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .pixel-logo i {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 2px 2px 0px #3b82f6;
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        .main-title span.white {
            color: #ffffff;
        }

        .main-title span.blue {
            color: #3b82f6;
        }

        .subtitle {
            color: #a1a1aa;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2rem;
            padding: 0 1rem;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 2rem;
        }

        .feature-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 1rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .feature-card:hover {
            border-color: #3f3f46;
            transform: translateY(-2px);
        }

        .feature-icon {
            color: #3b82f6;
            font-size: 1.2rem;
        }

        .feature-text {
            color: #e4e4e7;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .discord-btn {
            width: 100%;
            background: #5865F2;
            color: white;
            border: none;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            margin-bottom: 1.5rem;
        }

        .discord-btn:hover {
            background: #4752C4;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.4);
        }

        .discord-btn i {
            font-size: 1.3rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #71717a;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            border-top: 1px solid #27272a;
            padding-top: 1.5rem;
            width: 100%;
            justify-content: center;
            cursor: pointer;
        }

        .back-link:hover {
            color: #e4e4e7;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .features-grid {
                gap: 8px;
            }
            .feature-text {
                font-size: 0.7rem;
            }
            .main-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="network-bg"></canvas>

    <div class="modal-container">
        
        <div class="logo-wrapper">
            <div class="pixel-logo">
                <i class="fas fa-cube"></i>
            </div>
        </div>

        <h1 class="main-title">
            <span class="white">Iniciar</span> <span class="blue">Sesión</span>
        </h1>

        <p class="subtitle">
            Gestiona tus aplicaciones y licencias desde<br>un solo lugar de forma segura.
        </p>

        <div class="features-grid">
            <div class="feature-card">
                <i class="fas fa-shield-alt feature-icon"></i>
                <span class="feature-text">Seguro</span>
            </div>
            <div class="feature-card">
                <i class="fas fa-bolt feature-icon"></i>
                <span class="feature-text">Rápido</span>
            </div>
            <div class="feature-card">
                <i class="fas fa-cog feature-icon"></i>
                <span class="feature-text">Oficial</span>
            </div>
        </div>

        <button class="discord-btn" onclick="handleDiscordLogin(event)">
            <i class="fab fa-discord"></i>
            <span>Acceder con Discord</span>
        </button>

        <!-- CAMBIO: Ahora usa history.back() para volver atrás -->
        <a class="back-link" onclick="goBack()">
            <i class="fas fa-arrow-left"></i>
            Volver a la web
        </a>
    </div>

    <script>
        const CLIENT_ID = '1213866547181780992';
        const REDIRECT_URI = 'https://papeleta-script-github-io.vercel.app';

        function handleDiscordLogin(e) {
            e.preventDefault();
            
            const btn = document.querySelector('.discord-btn');
            const originalContent = btn.innerHTML;
            
            btn.innerHTML = '<span class="loading"></span><span>Conectando...</span>';
            btn.style.opacity = '0.8';
            
            setTimeout(() => {
                const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify%20email`;
                window.location.href = url;
            }, 500);
        }

        // FUNCIÓN PARA VOLVER ATRÁS
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/'; // Si no hay historial, va al inicio
            }
        }

        function initNetworkBg() {
            const canvas = document.getElementById('network-bg');
            const ctx = canvas.getContext('2d');
            let w, h, points;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            points = Array.from({ length: 45 }, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3
            }));

            function tick() {
                ctx.clearRect(0, 0, w, h);
                points.forEach(p => {
                    p.x += p.vx; 
                    p.y += p.vy;
                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;
                });

                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        const dx = points[i].x - points[j].x;
                        const dy = points[i].y - points[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            ctx.strokeStyle = `rgba(100,116,139,${1 - dist / 150})`;
                            ctx.lineWidth = 0.6;
                            ctx.beginPath();
                            ctx.moveTo(points[i].x, points[i].y);
                            ctx.lineTo(points[j].x, points[j].y);
                            ctx.stroke();
                        }
                    }
                    ctx.fillStyle = 'rgba(100,116,139,0.5)';
                    ctx.beginPath();
                    ctx.arc(points[i].x, points[i].y, 1.8, 0, Math.PI * 2);
                    ctx.fill();
                }
                requestAnimationFrame(tick);
            }
            tick();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                goBack();
            }
        });

        document.addEventListener('DOMContentLoaded', initNetworkBg);
    </script>
</body>
</html>
