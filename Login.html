<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Papeleta Store</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff1a1a'/%3E%3Cstop offset='1' stop-color='%23cc1b1b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='70' font-family='Arial, sans-serif' font-size='58' font-weight='900' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff1a1a;
            --bg-dark: #050507;
        }
        
        body {
            background-color: var(--bg-dark);
            color: #f3f4f6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        #network-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        .login-card {
            background: rgba(20, 10, 10, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 26, 26, 0.2);
            border-radius: 24px;
            padding: 3rem 2rem;
            max-width: 450px;
            width: 90%;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(255, 26, 26, 0.1);
        }

        .btn-discord {
            background: #5865F2;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }
        .btn-discord:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.5);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <!-- Fondo Animado -->
    <canvas id="network-bg"></canvas>
    
    <div class="login-card">
        <div class="mx-auto w-20 h-20 rounded-xl mb-6 shadow-lg border-2 border-red-600 bg-gradient-to-br from-red-500 to-red-800 flex items-center justify-center text-3xl font-black">P</div>
        <h1 class="text-3xl font-black text-white mb-2 tracking-wide uppercase">PAPELETA <span class="text-red-400">STORE</span></h1>
        <p class="text-gray-400 text-sm mb-8">Inicia sesión con Discord para acceder a tus compras, descargar recursos y gestionar licencias.</p>
        
        <button onclick="redirectToDiscord()" class="btn-discord w-full text-white font-bold py-3.5 px-6 rounded-xl flex items-center justify-center gap-3 transition-all duration-200 transform hover:scale-[1.02] mb-4">
            <i class="fab fa-discord text-xl"></i> Continuar con Discord
        </button>
        
        <a href="index.html" class="text-gray-500 hover:text-white text-sm transition-colors inline-flex items-center gap-2 mt-4">
            <i class="fas fa-arrow-left"></i> Volver a la tienda
        </a>
    </div>

    <script>
        const CLIENT_ID = '1213866547181780992'; 
        // Asegúrate de que esta URI coincida EXACTAMENTE con la configurada en tu App de Discord Developer Portal
        const REDIRECT_URI = 'https://papeleta-script-github-io.vercel.app'; 

        function redirectToDiscord() {
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify%20email`;
            window.location.href = url;
        }

        // --- FONDO ANIMADO (Red Network) ---
        function initNetworkBg() {
            const canvas = document.getElementById('network-bg');
            const ctx = canvas.getContext('2d');
            let w, h, points = [];

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
                points = Array.from({length: 50}, () => ({
                    x: Math.random() * w, y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4
                }));
            }
            window.addEventListener('resize', resize);
            resize();

            function animate() {
                ctx.clearRect(0, 0, w, h);
                for(let i=0; i<points.length; i++) {
                    let p = points[i];
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > w) p.vx *= -1;
                    if(p.y < 0 || p.y > h) p.vy *= -1;
                    
                    ctx.fillStyle = 'rgba(255, 26, 26, 0.5)';
                    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();

                    for(let j=i+1; j<points.length; j++) {
                        let p2 = points[j];
                        let dx = p.x - p2.x, dy = p.y - p2.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if(dist < 150) {
                            ctx.strokeStyle = `rgba(255, 26, 26, ${1 - dist/150})`;
                            ctx.lineWidth = 0.5;
                            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        document.addEventListener('DOMContentLoaded', initNetworkBg);
    </script>
</body>
</html>
