<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area De Cliente</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff1a1a'/%3E%3Cstop offset='1' stop-color='%23cc1b1b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='70' font-family='Arial, sans-serif' font-size='58' font-weight='900' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #050507 0%, #150a0a 100%); color: #e2e8f0; }
        .sidebar { background: rgba(10, 5, 5, 0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 26, 26, 0.1); }
        .card { background: rgba(21, 10, 10, 0.6); border: 1px solid rgba(255, 26, 26, 0.15); backdrop-filter: blur(10px); }
        .nav-item { transition: all 0.3s ease; }
        .nav-item:hover { background: rgba(255, 26, 26, 0.1); color: white; }
        .nav-item.active { background: rgba(255, 26, 26, 0.15); border-left: 3px solid #ff1a1a; color: #ff6b6b; }
        .stat-card { background: linear-gradient(135deg, rgba(21, 10, 10, 0.8) 0%, rgba(13, 5, 5, 0.8) 100%); border: 1px solid rgba(255, 26, 26, 0.15); }
        .btn-primary { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(220, 38, 38, 0.3); }
        .input-field { background: rgba(13, 5, 5, 0.8); border: 1px solid rgba(255, 26, 26, 0.2); }
        .input-field:focus { border-color: #ff1a1a; outline: none; }
        .gradient-text { background: linear-gradient(135deg, #ff1a1a 0%, #ff6b6b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0505; }
        ::-webkit-scrollbar-thumb { background: #7f1d1d; border-radius: 4px; }
        .admin-badge { background: rgba(220, 38, 38, 0.2); border: 1px solid rgba(220, 38, 38, 0.5); color: #ff6b6b; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-left: 8px; }
        .loading-error { background: rgba(220, 38, 38, 0.1); border: 1px solid rgba(220, 38, 38, 0.3); border-radius: 8px; padding: 16px; text-align: center; }
    </style>
</head>
<body class="min-h-screen flex">
    <!-- SIDEBAR -->
    <aside class="sidebar w-64 fixed left-0 top-0 h-full z-50 hidden md:block overflow-y-auto">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8 cursor-pointer" onclick="showSection('dashboard')">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-red-600 to-red-900 flex items-center justify-center font-black text-white shadow-lg">P</div>
                <div>
                    <span class="text-white font-bold text-lg tracking-wide block">AREA CLIENTES</span>
                    <span id="admin-badge-sidebar" class="admin-badge hidden">ADMIN</span>
                </div>
            </div>
            <nav class="space-y-2">
                <div class="text-xs text-gray-500 uppercase font-semibold mb-4 px-3 tracking-wider">Principal</div>
                <a href="#" onclick="showSection('dashboard')" id="nav-dashboard" class="nav-item active flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300">
                    <i class="fas fa-home w-5"></i><span>Inicio</span>
                </a>
                <a href="index.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300">
                    <i class="fas fa-store w-5"></i><span>Tienda</span>
                </a>
                <div id="admin-nav-section" class="hidden mt-6">
                    <div class="text-xs text-red-400 uppercase font-semibold mb-4 px-3 py-2 rounded-lg tracking-wider border border-red-900/30">
                        <i class="fas fa-shield-alt mr-2"></i>Panel Admin
                    </div>
                    <a href="#" onclick="loadExternalSection('subir-producto', 'SubirProducto.html')" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300">
                        <i class="fas fa-cloud-upload-alt w-5"></i><span>Subir Producto</span>
                    </a>
                    <a href="#" onclick="loadExternalSection('licencias', 'LicenciaUsuario.html')" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300">
                        <i class="fas fa-key w-5"></i><span>Licencias</span>
                    </a>
                    <a href="#" onclick="loadExternalSection('usuarios', 'UsuariosAutorizado.html')" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300">
                        <i class="fas fa-users-cog w-5"></i><span>Usuarios</span>
                    </a>
                </div>
            </nav>
        </div>
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-red-900/20 bg-[#0a0505]/50">
            <div class="flex items-center gap-3 px-3 py-2 rounded-lg bg-red-900/10 border border-red-900/20">
                <img id="sidebar-avatar" src="" alt="User" class="w-10 h-10 rounded-full border-2 border-red-600 object-cover">
                <div class="flex-1 min-w-0">
                    <p id="sidebar-username" class="text-white font-medium text-sm truncate">Usuario</p>
                    <p id="sidebar-role" class="text-red-400 text-xs font-bold uppercase">Cliente</p>
                </div>
                <button onclick="logout()" class="text-gray-400 hover:text-red-400 transition-colors"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content flex-1 md:ml-64 min-h-screen flex flex-col">
        <header class="border-b border-red-900/20 px-8 py-6 bg-[#0a0505]/30 backdrop-blur-sm sticky top-0 z-40">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-white mb-1">
                        Bienvenido, <span id="header-username" class="gradient-text">usuario</span>
                        <span id="header-admin-badge" class="admin-badge hidden">ADMIN</span>
                    </h1>
                    <p id="header-subtitle" class="text-gray-400 text-sm">Gestiona tus productos y licencias</p>
                </div>
                <a href="index.html" class="btn-primary px-5 py-2.5 rounded-lg text-white font-bold flex items-center gap-2">
                    <i class="fas fa-shopping-cart"></i> Ir al Catálogo
                </a>
            </div>
        </header>
        <div id="dynamic-content" class="p-6 md:p-8 flex-grow">
            <!-- Contenido dinámico -->
        </div>
    </main>

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="hidden fixed inset-0 bg-black/90 z-[60] flex items-center justify-center px-4 backdrop-blur-sm">
        <div class="max-w-md w-full bg-[#150a0a] border border-red-600/30 rounded-2xl p-8 text-center">
            <div class="mx-auto w-20 h-20 rounded-xl mb-6 bg-gradient-to-br from-red-600 to-red-900 flex items-center justify-center text-3xl font-black text-white">P</div>
            <h1 class="text-3xl font-black text-white mb-2">PAPELETA <span class="text-red-500">STORE</span></h1>
            <p class="text-gray-400 text-sm mb-8">Inicia sesión para acceder</p>
            <button onclick="loginAsGuest()" class="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white font-bold py-3.5 px-6 rounded-xl flex items-center justify-center gap-3 mb-3">
                <i class="fab fa-discord text-xl"></i> Iniciar Sesión con Discord
            </button>
            <button onclick="loginAsGuest()" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-xl text-sm">
                Continuar como Invitado (Demo)
            </button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const ADMIN_DISCORD_IDS = ['890526767608127489'];
        const firebaseConfig = {
            apiKey: "AIzaSyBWggE0KFiVZDxwxvmhuWXEKu6bNguV0mM",
            authDomain: "papeletalicencia.firebaseapp.com",
            projectId: "papeletalicencia",
            storageBucket: "papeletalicencia.firebasestorage.app",
            messagingSenderId: "677208314051",
            appId: "1:677208314051:web:a27c04f31d402e83f29276"
        };

        // Inicializar Firebase con timeout
        let db = null;
        let firebaseInitialized = false;
        
        function initFirebase() {
            return new Promise((resolve) => {
                const timeout = setTimeout(() => {
                    console.warn('⚠️ Firebase timeout - usando modo offline');
                    resolve(false);
                }, 5000);
                
                try {
                    if (!firebase.apps.length) {
                        firebase.initializeApp(firebaseConfig);
                    }
                    db = firebase.firestore();
                    db.collection('_test').get().then(() => {
                        clearTimeout(timeout);
                        firebaseInitialized = true;
                        console.log('✅ Firebase conectado');
                        resolve(true);
                    }).catch(() => {
                        clearTimeout(timeout);
                        console.warn('️ Firestore no accesible - modo offline');
                        resolve(false);
                    });
                } catch (e) {
                    clearTimeout(timeout);
                    console.error('❌ Error Firebase:', e);
                    resolve(false);
                }
            });
        }

        let currentUser = null;
        let currentUserRole = 'client';
        let allProducts = [];
        let mockData = {
            products: [],
            clients: [],
            licenses: []
        };

        function loginAsGuest() {
            currentUser = {
                id: 'guest_' + Date.now(),
                username: 'UsuarioDemo',
                avatar: null
            };
            currentUserRole = 'admin'; // Para testing
            
            document.getElementById('admin-nav-section').classList.remove('hidden');
            document.getElementById('admin-badge-sidebar').classList.remove('hidden');
            document.getElementById('header-admin-badge').classList.remove('hidden');
            document.getElementById('sidebar-role').textContent = 'Administrador';
            document.getElementById('header-username').innerText = currentUser.username;
            document.getElementById('sidebar-username').innerText = currentUser.username;
            document.getElementById('sidebar-avatar').src = 'https://cdn.discordapp.com/embed/avatars/0.png';
            document.getElementById('login-modal').classList.add('hidden');
            
            showSection('dashboard');
        }

        function logout() {
            currentUser = null;
            currentUserRole = 'client';
            location.reload();
        }

        function isAdmin() {
            if (!currentUser) return false;
            return ADMIN_DISCORD_IDS.includes(currentUser.id) || currentUserRole === 'admin';
        }

        async function showSection(section) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            const navItem = document.getElementById(`nav-${section}`);
            if (navItem) navItem.classList.add('active');

            const contentDiv = document.getElementById('dynamic-content');
            
            if (section === 'dashboard') {
                await loadDashboardSection(contentDiv);
            } else {
                contentDiv.innerHTML = '<div class="text-center py-12"><i class="fas fa-spinner fa-spin text-3xl text-red-500 mb-3"></i><p class="text-gray-400">Cargando...</p></div>';
            }
        }

        async function loadExternalSection(sectionName, fileUrl) {
            const contentDiv = document.getElementById('dynamic-content');
            contentDiv.innerHTML = '<div class="text-center py-12"><i class="fas fa-spinner fa-spin text-3xl text-red-500 mb-3"></i><p class="text-gray-400">Cargando sección...</p></div>';
            
            try {
                const response = await fetch(fileUrl);
                if (!response.ok) throw new Error('No se pudo cargar');
                const html = await response.text();
                contentDiv.innerHTML = `<div class="animate-fade-in">${html}</div>`;
            } catch (error) {
                console.error(error);
                contentDiv.innerHTML = `
                    <div class="loading-error">
                        <i class="fas fa-exclamation-triangle text-3xl text-red-500 mb-3"></i>
                        <p class="text-red-400 font-semibold">Error al cargar la sección</p>
                        <p class="text-gray-500 text-sm mt-2">${error.message}</p>
                        <button onclick="showSection('dashboard')" class="mt-4 btn-primary px-4 py-2 rounded-lg text-sm">
                            <i class="fas fa-home mr-2"></i>Volver al Inicio
                        </button>
                    </div>
                `;
            }
        }

        async function loadDashboardSection(container) {
            document.getElementById('header-subtitle').textContent = 'Panel de control principal';
            
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="stat-card rounded-xl p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-400 text-xs uppercase font-semibold mb-1">Total Invertido</p>
                                <p id="stat-total-spent" class="text-2xl font-bold text-white">$0.00</p>
                            </div>
                            <div class="w-12 h-12 rounded-lg bg-red-500/10 border border-red-500/20 flex items-center justify-center">
                                <i class="fas fa-wallet text-red-400 text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="stat-card rounded-xl p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-400 text-xs uppercase font-semibold mb-1">Scripts Activos</p>
                                <p id="stat-active-scripts" class="text-2xl font-bold text-white">0</p>
                            </div>
                            <div class="w-12 h-12 rounded-lg bg-green-500/10 border border-green-500/20 flex items-center justify-center">
                                <i class="fas fa-lock text-green-400 text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="stat-card rounded-xl p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-400 text-xs uppercase font-semibold mb-1">Estado</p>
                                <p class="text-lg font-bold text-green-400">Activo</p>
                            </div>
                            <div class="w-12 h-12 rounded-lg bg-blue-500/10 border border-blue-500/20 flex items-center justify-center">
                                <i class="fas fa-check-circle text-blue-400 text-xl"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card rounded-xl p-6">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-8 h-8 rounded-lg bg-red-500/10 border border-red-500/20 flex items-center justify-center">
                            <i class="fas fa-cube text-red-400"></i>
                        </div>
                        <h2 class="text-lg font-bold text-white">Mis Productos</h2>
                    </div>
                    <div id="dashboard-products-list" class="space-y-3">
                        <div class="text-center py-12 text-gray-500">
                            <i class="fas fa-spinner fa-spin text-2xl mb-3"></i>
                            <p>Cargando productos...</p>
                        </div>
                    </div>
                </div>
            `;

            await loadDashboardData();
        }

        async function loadDashboardData() {
            const container = document.getElementById('dashboard-products-list');
            if (!container) return;

            try {
                // Intentar cargar de Firebase
                if (firebaseInitialized && db) {
                    const productsSnapshot = await db.collection("Productos").get();
                    allProducts = [];
                    productsSnapshot.forEach((doc) => allProducts.push({ id: doc.id, ...doc.data() }));
                } else {
                    // Usar datos mock si Firebase falla
                    allProducts = mockData.products;
                }

                if (allProducts.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-12 border-2 border-dashed border-red-900/30 rounded-xl">
                            <i class="fas fa-box-open text-gray-600 text-4xl mb-3"></i>
                            <p class="text-gray-400 mb-4">No tienes productos aún</p>
                            ${isAdmin() ? `<button onclick="loadExternalSection('subir-producto', 'SubirProducto.html')" class="btn-primary px-6 py-2 rounded-lg text-white text-sm"><i class="fas fa-plus mr-2"></i>Subir Producto</button>` : ''}
                        </div>
                    `;
                    document.getElementById('stat-total-spent').innerText = '$0.00';
                    document.getElementById('stat-active-scripts').innerText = '0';
                    return;
                }

                container.innerHTML = allProducts.map(item => `
                    <div class="bg-[#0d0505] border border-red-900/30 rounded-xl p-4 flex items-center justify-between hover:border-red-600/50 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-16 rounded-lg bg-[#150a0a] border border-red-900/20 overflow-hidden">
                                <img src="${item.image_url || ''}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/64'">
                            </div>
                            <div>
                                <h3 class="text-white font-bold">${item.name}</h3>
                                <p class="text-gray-400 text-xs">${item.price === 'Gratis' ? 'GRATIS' : '$' + Number(item.price).toFixed(2)}</p>
                            </div>
                        </div>
                        <button class="btn-primary px-4 py-2 rounded-lg text-white text-sm">
                            <i class="fas fa-download"></i> Descargar
                        </button>
                    </div>
                `).join('');

                const totalSpent = allProducts.reduce((acc, p) => acc + (Number(p.price) || 0), 0);
                document.getElementById('stat-total-spent').innerText = '$' + totalSpent.toFixed(2);
                document.getElementById('stat-active-scripts').innerText = allProducts.length;

            } catch (error) {
                console.error("Error:", error);
                container.innerHTML = `
                    <div class="loading-error">
                        <i class="fas fa-exclamation-triangle text-2xl text-red-500 mb-2"></i>
                        <p class="text-red-400">Error al cargar productos</p>
                        <button onclick="loadDashboardData()" class="mt-3 btn-primary px-4 py-2 rounded text-sm"><i class="fas fa-redo mr-2"></i>Reintentar</button>
                    </div>
                `;
            }
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', async () => {
            await initFirebase();
            document.getElementById('login-modal').classList.remove('hidden');
        });
    </script>
</body>
</html>
