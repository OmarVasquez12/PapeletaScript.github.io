<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papeleta Store</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff1a1a'/%3E%3Cstop offset='1' stop-color='%23cc1b1b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='70' font-family='Arial, sans-serif' font-size='58' font-weight='900' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg-body: #050507; --primary: #ff1a1a; }
        body { background-color: #050507; color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #111111; }
        ::-webkit-scrollbar-thumb { background: #6e6e6e; border-radius: 5px; }
        .red-glow { text-shadow: 0 0 18px rgba(255, 26, 26, 0.85); }
        .page { display: none; }
        .page.active { display: block; }
        #network-bg { position: fixed; inset: 0; z-index: 0; opacity: 0.5; pointer-events: none; }
        .cart-badge { position: absolute; top: -8px; right: -8px; background: #ff1a1a; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">
    <canvas id="network-bg"></canvas>

    <!-- MODALS -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/80 z-[80] flex items-center justify-center backdrop-blur-sm">
        <div class="bg-[#150a0a] w-full md:w-[480px] rounded-2xl border border-red-900/50 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="bg-red-600 px-6 py-4 rounded-t-2xl flex justify-between items-center">
                <h2 class="text-white font-bold">Mi Carrito</h2>
                <button onclick="closeCartModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="cart-items" class="p-4 overflow-y-auto flex-grow"></div>
            <div class="p-4 border-t border-red-900/50">
                <div class="flex justify-between mb-4"><span class="text-white">Total:</span><span id="cart-total" class="font-bold text-xl text-white">$0.00</span></div>
                <div id="paypal-button-container"></div>
            </div>
        </div>
    </div>

    <!-- HEADER -->
    <header class="bg-[#0d0505]/90 backdrop-blur border-b border-red-900/30 sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
            <div class="w-9 h-9 rounded-lg bg-red-600 flex items-center justify-center font-black">P</div>
            <span class="text-white font-black tracking-widest text-lg">PAPELETA <span class="text-red-400">STORE</span></span>
        </div>
        <nav class="hidden md:flex gap-8 text-sm font-semibold text-gray-300">
            <a href="#" onclick="showPage('inicio')" class="hover:text-red-400">Inicio</a>
            <a href="#" onclick="showPage('productos')" class="hover:text-red-400">Productos</a>
            <a href="AreaCliente.html" class="hover:text-red-400">Mi Área</a>
        </nav>
        <div class="flex items-center gap-3">
            <button onclick="openCartModal()" class="relative bg-[#150a0a] border border-red-900/50 w-10 h-10 rounded-full flex items-center justify-center">
                <i class="fas fa-shopping-cart text-gray-300"></i>
                <span id="cart-count" class="cart-badge hidden">0</span>
            </button>
            <div id="user-section" class="hidden flex items-center gap-2 bg-[#150a0a] px-3 py-1 rounded-full border border-red-900/50 cursor-pointer" onclick="window.location.href='AreaCliente.html'">
                <img id="user-avatar" src="" class="w-7 h-7 rounded-full border border-red-500">
                <span id="user-name" class="text-white text-sm font-medium">...</span>
            </div>
            <button id="login-btn" onclick="redirectToDiscord()" class="bg-[#5865F2] hover:bg-[#4752C4] text-white font-bold py-2 px-5 rounded-lg text-sm">Acceder</button>
        </div>
    </header>

    <!-- CONTENT -->
    <main class="relative z-10 flex-grow">
        <section id="page-inicio" class="page active max-w-6xl mx-auto px-6 py-20 text-center">
            <h1 class="text-5xl font-black text-white mb-6">PAPELETA <span class="text-red-400 red-glow">STORE</span></h1>
            <p class="text-gray-400 max-w-2xl mx-auto mb-10">La mejor tienda de recursos para MTA:SA. Scripts, modelos y herramientas exclusivas.</p>
            <button onclick="showPage('productos')" class="bg-red-600 hover:bg-red-700 px-10 py-4 rounded-xl font-bold uppercase tracking-widest">Explorar Tienda</button>
        </section>

        <section id="page-productos" class="page max-w-6xl mx-auto px-6 py-12">
            <h2 class="text-3xl font-black text-white mb-8">NUESTROS <span class="text-red-400">PRODUCTOS</span></h2>
            <div id="products-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Productos aquí -->
            </div>
        </section>
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBWggE0KFiVZDxwxvmhuWXEKu6bNguV0mM", authDomain: "papeletalicencia.firebaseapp.com", projectId: "papeletalicencia", storageBucket: "papeletalicencia.firebasestorage.app", messagingSenderId: "677208314051", appId: "1:677208314051:web:a27c04f31d402e83f29276" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allProducts = [];
        let cart = [];

        function redirectToDiscord() {
            const CLIENT_ID = '1213866547181780992';
            const REDIRECT_URI = encodeURIComponent(window.location.origin + window.location.pathname);
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=identify`;
        }

        function checkAuth() {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const token = fragment.get('access_token') || localStorage.getItem('dc_token');
            if (token) {
                if (fragment.get('access_token')) localStorage.setItem('dc_token', token);
                fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } })
                .then(res => res.json())
                .then(user => {
                    if (user.id) {
                        document.getElementById('login-btn').classList.add('hidden');
                        document.getElementById('user-section').classList.remove('hidden');
                        document.getElementById('user-name').innerText = user.username;
                        document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                    }
                });
            }
        }

        async function loadProducts() {
            const snap = await db.collection("Productos").get();
            allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = allProducts.map(p => `
                <div class="bg-[#150a0a] border border-red-900/20 rounded-2xl overflow-hidden p-5">
                    <img src="${p.image_url}" class="w-full h-40 object-cover rounded-lg mb-4">
                    <h3 class="text-white font-bold text-lg">${p.name}</h3>
                    <p class="text-red-400 font-black text-xl mb-4">$${p.price}</p>
                    <button onclick="addToCart('${p.id}')" class="w-full bg-red-600 py-2 rounded-lg font-bold">Añadir al Carrito</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = allProducts.find(x => x.id === id);
            cart.push(p);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-count').classList.remove('hidden');
            const total = cart.reduce((s, x) => s + Number(x.price), 0);
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        function showPage(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + name).classList.add('active');
        }

        function openCartModal() { document.getElementById('cart-modal').classList.remove('hidden'); }
        function closeCartModal() { document.getElementById('cart-modal').classList.add('hidden'); }

        window.onload = () => { checkAuth(); loadProducts(); };
    </script>
</body>
</html>
