<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papeleta Store | Detalles del Producto</title>
    
    <!-- Mismo Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff1a1a'/%3E%3Cstop offset='1' stop-color='%23cc1b1b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='70' font-family='Arial, sans-serif' font-size='58' font-weight='900' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- FIREBASE SDKs (Mismos que index) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        /* Copia exacta de tus variables y estilos */
        :root {
            --bg-body: #050507;
            --primary: #ff1a1a;
            --success: #00ff44;
        }
        
        body {
            background-color: #050507;
            color: #f3f4f6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(to bottom, #150a0a, #0a0505);
            min-height: 100vh;
        }

        .red-glow { text-shadow: 0 0 18px rgba(255, 26, 26, 0.85); }
        .red-border { border-color: rgba(255, 26, 26, 0.25); }
        
        #network-bg { position: fixed; inset: 0; z-index: 0; opacity: 0.5; pointer-events: none; }

        /* Estilos específicos para la tarjeta de producto */
        .product-card {
            background: rgba(20, 10, 10, 0.6);
            border: 1px solid rgba(255, 26, 26, 0.15);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .btn-reclamar {
            background: linear-gradient(135deg, #00cc33, #009922);
            box-shadow: 0 4px 15px rgba(0, 255, 68, 0.2);
            transition: all 0.3s ease;
        }
        .btn-reclamar:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 68, 0.4);
        }

        .btn-detalles {
            border: 1px solid rgba(255, 26, 26, 0.3);
            background: rgba(20, 10, 10, 0.4);
            transition: all 0.3s ease;
        }
        .btn-detalles:hover {
            border-color: rgba(255, 26, 26, 0.6);
            background: rgba(255, 26, 26, 0.1);
        }

        .btn-eliminar {
            border: 1px solid rgba(255, 0, 0, 0.2);
            color: #ff4444;
            background: transparent;
            transition: all 0.3s ease;
        }
        .btn-eliminar:hover {
            background: rgba(255, 0, 0, 0.1);
            border-color: rgba(255, 0, 0, 0.5);
        }
    </style>
</head>
<body class="relative flex flex-col min-h-screen">

    <canvas id="network-bg"></canvas>

    <!-- Header Simple -->
    <header class="relative z-10 bg-[#0d0505]/90 backdrop-blur border-b border-red-900/30 sticky top-0 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-red-500 to-red-800 flex items-center justify-center font-black text-white">P</div>
                <span class="text-white font-black tracking-widest text-lg">PAPELETA <span class="text-red-400">STORE</span></span>
            </div>
            <button onclick="window.location.href='index.html'" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2 text-sm font-semibold">
                <i class="fas fa-arrow-left"></i> Volver a la Tienda
            </button>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="relative z-10 flex-grow flex items-center justify-center p-6">
        
        <!-- Tarjeta del Producto (Estilo igual al screenshot) -->
        <div id="product-container" class="product-card w-full max-w-md rounded-2xl overflow-hidden shadow-2xl relative hidden">
            
            <!-- Imagen del Producto -->
            <div class="relative h-56 w-full bg-[#0d0505] group overflow-hidden">
                <img id="p-image" src="" alt="Producto" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                
                <!-- Badge de Precio (Esquina superior derecha) -->
                <div id="p-badge" class="absolute top-4 right-4 bg-green-600 text-white font-black px-4 py-1.5 rounded-full text-xs uppercase tracking-wide shadow-lg shadow-green-900/50">
                    GRATIS
                </div>
            </div>

            <!-- Información y Botones -->
            <div class="p-6">
                <!-- Categoría -->
                <span id="p-category" class="inline-block bg-red-950/60 border border-red-800 text-red-300 text-[10px] font-bold px-2.5 py-1 rounded-md mb-3 uppercase tracking-wider">
                    Scripts
                </span>

                <!-- Título -->
                <h1 id="p-title" class="text-2xl font-black text-white mb-1 leading-tight">
                    Cargando...
                </h1>
                
                <!-- Descripción Corta -->
                <p id="p-desc" class="text-gray-400 text-sm mb-6 line-clamp-2">
                    Cargando descripción...
                </p>

                <!-- Grid de Botones -->
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <!-- Botón Reclamar -->
                    <button onclick="reclamarProducto()" class="btn-reclamar text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 text-sm">
                        <i class="fas fa-shopping-cart"></i>
                        Reclamar
                    </button>
                    
                    <!-- Botón Detalles -->
                    <button onclick="verDetalles()" class="btn-detalles text-gray-300 font-semibold py-3 rounded-xl flex items-center justify-center gap-2 text-sm">
                        <i class="fas fa-info-circle"></i>
                        Detalles
                    </button>
                </div>

                <!-- Botón Eliminar (Solo Admin) -->
                <button id="btn-delete" onclick="eliminarProducto()" class="btn-eliminar w-full py-2.5 rounded-xl flex items-center justify-center gap-2 text-xs font-semibold hidden">
                    <i class="fas fa-trash-alt"></i>
                    Eliminar
                </button>
            </div>
        </div>

        <!-- Estado de carga/error -->
        <div id="loading-msg" class="text-center">
            <i class="fas fa-spinner animate-spin text-red-500 text-4xl mb-4"></i>
            <p class="text-gray-400">Buscando producto...</p>
        </div>

    </main>

    <footer class="relative z-10 bg-[#080505] text-center py-6 border-t border-red-950/30 text-xs text-gray-500 mt-auto">
        <p>&copy; 2026 Papeleta Store. Todos los derechos reservados.</p>
    </footer>

    <script>
        // --- CONFIGURACIÓN (Idéntica a index.html) ---
        const CLIENT_ID = '1213866547181780992'; 
        const REDIRECT_URI = window.location.href.split('#')[0]; 
        
        const ADMIN_DISCORD_IDS = ['890526767608127489']; 
        const ADMIN_DISCORD_USERNAMES = ['Papeleta']; 

        function isAdmin(user) {
            if (!user) return false;
            if (ADMIN_DISCORD_IDS.includes(user.id)) return true;
            if (user.username && ADMIN_DISCORD_USERNAMES.includes(user.username.toLowerCase())) return true;
            return false;
        }

        let currentUser = null;

        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBWggE0KFiVZDxwxvmhuWXEKu6bNguV0mM",
            authDomain: "papeletalicencia.firebaseapp.com",
            databaseURL: "https://papeletalicencia-default-rtdb.firebaseio.com",
            projectId: "papeletalicencia",
            storageBucket: "papeletalicencia.firebasestorage.app",
            messagingSenderId: "677208314051",
            appId: "1:677208314051:web:a27c04f31d402e83f29276",
            measurementId: "G-RPJ4KQ6EQ4"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // --- LÓGICA DE PRODUCTO ---
        
        // Obtener ID de la URL (?id=...)
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        async function loadProduct() {
            if (!productId) {
                document.getElementById('loading-msg').innerHTML = '<p class="text-red-400">No se especificó un producto.</p><button onclick="history.back()" class="mt-4 text-white underline">Volver</button>';
                return;
            }

            try {
                const doc = await db.collection("Productos").doc(productId).get();
                
                if (!doc.exists) {
                    document.getElementById('loading-msg').innerHTML = '<p class="text-red-400">Producto no encontrado.</p><button onclick="history.back()" class="mt-4 text-white underline">Volver</button>';
                    return;
                }

                const data = doc.data();
                
                // Rellenar datos en el HTML
                document.getElementById('p-image').src = data.image_url || 'https://via.placeholder.com/400x300';
                document.getElementById('p-title').innerText = data.name;
                document.getElementById('p-desc').innerText = data.description || 'Sin descripción disponible.';
                document.getElementById('p-category').innerText = data.category || 'General';
                
                // Configurar Badge de Precio
                const badge = document.getElementById('p-badge');
                if (Number(data.price) === 0) {
                    badge.innerText = 'GRATIS';
                    badge.className = 'absolute top-4 right-4 bg-green-600 text-white font-black px-4 py-1.5 rounded-full text-xs uppercase tracking-wide shadow-lg shadow-green-900/50';
                } else {
                    badge.innerText = '$' + Number(data.price).toFixed(2);
                    badge.className = 'absolute top-4 right-4 bg-red-600 text-white font-black px-4 py-1.5 rounded-full text-xs uppercase tracking-wide shadow-lg shadow-red-900/50';
                }

                // Mostrar contenedor y ocultar loading
                document.getElementById('loading-msg').classList.add('hidden');
                document.getElementById('product-container').classList.remove('hidden');

                // Verificar si es Admin para mostrar botón eliminar
                checkAdminStatus();

            } catch (error) {
                console.error(error);
                document.getElementById('loading-msg').innerHTML = '<p class="text-red-400">Error al cargar datos.</p>';
            }
        }

        async function checkAdminStatus() {
            // Verificar token local primero
            const token = localStorage.getItem('dc_access_token');
            if (!token) return;

            try {
                const res = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const user = await res.json();
                    currentUser = user;
                    if (isAdmin(user)) {
                        document.getElementById('btn-delete').classList.remove('hidden');
                    }
                }
            } catch (e) { console.log(e); }
        }

        // --- ACCIONES ---

        async function reclamarProducto() {
            // Verificar sesión
            const token = localStorage.getItem('dc_access_token');
            if (!token) {
                alert('Debes iniciar sesión para reclamar este producto.');
                // Redirigir al login del index
                window.location.href = 'index.html#login'; 
                return;
            }

            try {
                // Obtener datos usuario actual
                const res = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const user = await res.json();

                // Guardar compra/reclamo en Firebase "Clientes"
                const purchaseData = {
                    discord_id: user.id,
                    username: user.username,
                    avatar: user.avatar,
                    products: [{
                        id: productId,
                        name: document.getElementById('p-title').innerText,
                        price: "Gratis" // Asumimos gratis por el botón, o leer de data
                    }],
                    total_price: "Gratis",
                    date: firebase.firestore.FieldValue.serverTimestamp(),
                    status: "Reclamado Exitosamente"
                };

                await db.collection("Clientes").add(purchaseData);
                
                // Generar Licencia
                await createLicense(productId, document.getElementById('p-title').innerText, user);

                alert('¡Producto reclamado con éxito! Se ha generado tu licencia.');
                window.location.href = 'AreaCliente.html'; // O donde tengas el dashboard

            } catch (error) {
                console.error(error);
                alert('Error al procesar la reclamación: ' + error.message);
            }
        }

        function verDetalles() {
            // Aquí podrías abrir un modal o redirigir a una página de info completa
            alert('Aquí se mostraría la información detallada, changelog e instrucciones de instalación.');
        }

        async function eliminarProducto() {
            if(!confirm('¿Seguro que deseas eliminar este producto permanentemente?')) return;
            
            try {
                await db.collection("Productos").doc(productId).delete();
                alert('Producto eliminado.');
                window.location.href = 'index.html';
            } catch(e) {
                alert('Error al eliminar: ' + e.message);
            }
        }

        // --- UTILIDADES ---

        async function createLicense(productId, productName, user) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let key = '';
            for (let i = 0; i < 20; i++) key += chars.charAt(Math.floor(Math.random() * chars.length));

            await db.collection("Licencias").add({
                discord_id: user.id,
                username: user.username,
                product_id: productId,
                product_name: productName,
                key: key,
                created_at: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'active'
            });
        }

        // --- FONDO ANIMADO (Igual que index) ---
        function initNetworkBg() {
            const canvas = document.getElementById('network-bg');
            const ctx = canvas.getContext('2d');
            let w, h, points;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            points = Array.from({ length: 45 }, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3
            }));

            function tick() {
                ctx.clearRect(0, 0, w, h);
                points.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;
                });
                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        const dx = points[i].x - points[j].x;
                        const dy = points[i].y - points[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            ctx.strokeStyle = `rgba(255,26,26,${1 - dist / 150})`;
                            ctx.lineWidth = 0.6;
                            ctx.beginPath();
                            ctx.moveTo(points[i].x, points[i].y);
                            ctx.lineTo(points[j].x, points[j].y);
                            ctx.stroke();
                        }
                    }
                    ctx.fillStyle = 'rgba(255,26,26,0.8)';
                    ctx.beginPath();
                    ctx.arc(points[i].x, points[i].y, 1.8, 0, Math.PI * 2);
                    ctx.fill();
                }
                requestAnimationFrame(tick);
            }
            tick();
        }

        // Iniciar
        document.addEventListener('DOMContentLoaded', () => {
            loadProduct();
            initNetworkBg();
        });
    </script>
</body>
</html>
