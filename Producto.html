<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff1a1a'/%3E%3Cstop offset='1' stop-color='%23cc1b1b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='70' font-family='Arial, sans-serif' font-size='58' font-weight='900' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-body: #050507;
            --bg-card: rgba(20, 10, 10, 0.6);
            --primary: #ff1a1a;
            --success: #00ff44;
            --text-main: #ffffff;
            --text-muted: #9496a1;
        }
        
        body {
            background: linear-gradient(to bottom, #150a0a, #0a0505);
            color: #f3f4f6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        .red-glow {
            text-shadow: 0 0 18px rgba(255, 26, 26, 0.85);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #150a0a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #951d1d; border-radius: 3px; }

        #network-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }

        .product-card {
            background: rgba(20, 10, 10, 0.6);
            border: 1px solid rgba(255, 26, 26, 0.15);
            backdrop-filter: blur(10px);
        }

        /* Estilos para Botón Gratis */
        .btn-gratis {
            background: linear-gradient(135deg, #00ff44, #00cc33);
            box-shadow: 0 0 20px rgba(0, 255, 68, 0.4);
            transition: all 0.3s ease;
        }
        .btn-gratis:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 255, 68, 0.6);
        }

        /* Estilos para Botón Comprar */
        .btn-comprar {
            background: linear-gradient(135deg, #ff1a1a, #cc0000);
            box-shadow: 0 0 20px rgba(255, 26, 26, 0.4);
            transition: all 0.3s ease;
        }
        .btn-comprar:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 26, 26, 0.6);
        }

        .btn-download {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .btn-download:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-eliminar {
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff4444;
            transition: all 0.3s ease;
        }
        .btn-eliminar:hover {
            background: rgba(255, 0, 0, 0.1);
            border-color: rgba(255, 0, 0, 0.6);
        }

        /* Gallery Styles - Compact */
        .gallery-container {
            position: relative;
            background: rgba(13, 5, 5, 0.8);
            border-bottom: 1px solid rgba(255, 26, 26, 0.1);
        }

        .gallery-main-image {
            width: 100%;
            height: 250px;
            object-fit: contain;
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.05), rgba(153, 27, 27, 0.05));
        }

        .gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(220, 38, 38, 0.9);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 12px;
            z-index: 10;
        }

        .gallery-nav:hover {
            background: rgba(220, 38, 38, 1);
            transform: translateY(-50%) scale(1.1);
        }

        .gallery-nav.prev { left: 10px; }
        .gallery-nav.next { right: 10px; }

        .gallery-thumbnails {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            overflow-x: auto;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        .gallery-thumbnail {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            flex-shrink: 0;
            opacity: 0.6;
        }

        .gallery-thumbnail:hover {
            opacity: 1;
            border-color: rgba(220, 38, 38, 0.5);
            transform: scale(1.05);
        }

        .gallery-thumbnail.active {
            opacity: 1;
            border-color: #dc2626;
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.6);
        }

        .image-counter {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            .gallery-main-image { height: 200px; }
            .gallery-nav { width: 28px; height: 28px; font-size: 10px; }
            .gallery-thumbnail { width: 50px; height: 50px; }
        }
    </style>
</head>
<body class="relative">

    <canvas id="network-bg"></canvas>

    <!-- Header -->
    <header class="relative z-10 bg-[#0d0505]/90 backdrop-blur border-b border-red-900/30 sticky top-0 px-4 py-3">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-red-500 to-red-800 flex items-center justify-center font-black text-white text-sm shadow-[0_0_15px_rgba(220,38,38,0.5)]">P</div>
                <span class="text-white font-black tracking-widest text-base">PAPELETA <span class="text-red-500 red-glow">STORE</span></span>
            </div>
            <button onclick="window.location.href='index.html'" class="text-gray-400 hover:text-white transition-colors text-sm flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Volver
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 max-w-2xl mx-auto px-4 py-8">
        
        <!-- Product Card -->
        <div class="product-card rounded-xl overflow-hidden shadow-2xl border-t border-red-900/20">
            
            <!-- Gallery Container -->
            <div class="gallery-container relative group">
                <img id="product-image" src="" alt="Producto" class="gallery-main-image">
                
                <!-- Image Counter -->
                <span id="image-counter" class="image-counter hidden">1 / 1</span>
                
                <!-- Navigation Buttons -->
                <button id="gallery-prev" class="gallery-nav prev" onclick="changeImage(-1)">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button id="gallery-next" class="gallery-nav next" onclick="changeImage(1)">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>

            <!-- Thumbnails -->
            <div id="gallery-thumbnails" class="px-4 pt-3 hidden">
                <!-- Thumbnails will be inserted here -->
            </div>

            <!-- Product Info -->
            <div class="p-5">
                <div class="mb-4">
                    <div class="flex justify-between items-start mb-2">
                        <span id="product-category" class="inline-block bg-red-950/60 border border-red-800 text-red-300 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wide">
                            Scripts
                        </span>
                        <!-- Price Tag Display -->
                        <div id="price-display" class="text-xl font-black text-white tracking-tight">
                            <!-- JS insertará el precio aquí -->
                        </div>
                    </div>

                    <h1 id="product-title" class="text-2xl md:text-3xl font-black text-white mb-2 leading-tight">

                    </h1>

                <!-- Action Buttons Area -->
                <div class="mt-6 space-y-3">
                    
                    <!-- Primary Button (Dynamic: Buy or Free) -->
                    <button id="action-btn" onclick="handleMainAction()" class="w-full font-bold py-3.5 rounded-lg flex items-center justify-center gap-2 text-sm uppercase tracking-wider shadow-lg">
                        <!-- JS insertará contenido aquí -->
                    </button>

                    <!-- Secondary Button (Download) -->
                    <button onclick="downloadProduct()" class="btn-download w-full text-gray-300 font-semibold py-3 rounded-lg flex items-center justify-center gap-2 text-sm hover:text-white">
                        <i class="fas fa-cloud-download-alt"></i>
                        Descargar Archivo
                    </button>

                    <!-- Delete Button (Admin Only) -->
                    <button id="delete-btn" onclick="eliminarProducto()" class="btn-eliminar w-full mt-2 py-2 rounded-lg flex items-center justify-center gap-2 text-xs font-semibold hidden opacity-70 hover:opacity-100">
                        <i class="fas fa-trash-alt"></i>
                        Eliminar Producto
                    </button>
                </div>
            </div>
        </div>

        <!-- Additional Info - Compact -->
        <div class="mt-6 grid grid-cols-3 gap-3">
            <div class="product-card rounded-lg p-3 text-center border-t-2 border-red-900/30">
                <i class="fas fa-bolt text-red-500 text-lg mb-2 drop-shadow-[0_0_8px_rgba(239,68,68,0.6)]"></i>
                <p class="text-white font-bold text-xs">Entrega</p>
                <p class="text-gray-500 text-[10px] mt-0.5">Inmediata</p>
            </div>
            <div class="product-card rounded-lg p-3 text-center border-t-2 border-red-900/30">
                <i class="fas fa-headset text-red-500 text-lg mb-2 drop-shadow-[0_0_8px_rgba(239,68,68,0.6)]"></i>
                <p class="text-white font-bold text-xs">Soporte</p>
                <p class="text-gray-500 text-[10px] mt-0.5">24/7 Discord</p>
            </div>
            <div class="product-card rounded-lg p-3 text-center border-t-2 border-red-900/30">
                <i class="fas fa-sync-alt text-red-500 text-lg mb-2 drop-shadow-[0_0_8px_rgba(239,68,68,0.6)]"></i>
                <p class="text-white font-bold text-xs">Updates</p>

    <footer class="relative z-10 bg-[#080505] text-center py-6 border-t border-red-950/30 text-[10px] text-gray-600 mt-8">
        <p>&copy; 2026 Papeleta Store. Todos los derechos reservados.</p>
    </footer>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBWggE0KFiVZDxwxvmhuWXEKu6bNguV0mM",
            authDomain: "papeletalicencia.firebaseapp.com",
            databaseURL: "https://papeletalicencia-default-rtdb.firebaseio.com",
            projectId: "papeletalicencia",
            storageBucket: "papeletalicencia.firebasestorage.app",
            messagingSenderId: "677208314051",
            appId: "1:677208314051:web:a27c04f31d402e83f29276"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        let currentProduct = null;
        let currentUser = null;
        let currentImageIndex = 0;
        let productImages = [];
        let isFreeProduct = false; // Flag to track if product is free

        // Load product data
        async function loadProduct() {
            if (!productId) {
                alert('Producto no especificado');
                window.location.href = 'index.html';
                return;
            }

            try {
                const doc = await db.collection("Productos").doc(productId).get();
                
                if (!doc.exists) {
                    alert('Producto no encontrado');
                    window.location.href = 'index.html';
                    return;
                }

                currentProduct = doc.data();
                
                // --- LOGICA DE PRECIO Y BOTONES ---
                const priceVal = Number(currentProduct.price);
                const priceStr = String(currentProduct.price).toLowerCase();
                
                // Determinar si es gratis (si el precio es 0 o la palabra "gratis")
                isFreeProduct = (priceVal === 0 || priceStr === 'gratis' || priceStr === 'free');

                const actionBtn = document.getElementById('action-btn');
                const priceDisplay = document.getElementById('price-display');

                if (isFreeProduct) {
                    // ESTILO GRATIS (Como imagen 2 pero con tu estilo)
                    actionBtn.className = "w-full btn-gratis text-black font-black py-3.5 rounded-lg flex items-center justify-center gap-2 text-sm uppercase tracking-wider";
                    actionBtn.innerHTML = `<i class="fas fa-gift text-lg"></i> CANJEAR GRATIS`;
                    
                    priceDisplay.innerHTML = `<span class="text-green-400 drop-shadow-[0_0_10px_rgba(74,222,128,0.5)]">GRATIS</span>`;
                } else {
                    // ESTILO PAGO (Como imagen 1 pero con tu estilo)
                    actionBtn.className = "w-full btn-comprar text-white font-black py-3.5 rounded-lg flex items-center justify-center gap-2 text-sm uppercase tracking-wider";
                    actionBtn.innerHTML = `<i class="fas fa-shopping-cart"></i> COMPRAR AHORA`;
                    
                    priceDisplay.innerHTML = `$${currentProduct.price}`;
                }
                // ----------------------------------

                // Setup images array
                if (currentProduct.images && currentProduct.images.length > 0) {
                    productImages = currentProduct.images;
                } else if (currentProduct.image_url) {
                    productImages = [currentProduct.image_url];
                } else {
                    productImages = ['https://via.placeholder.com/800x600/1a0505/ff1a1a?text=No+Image'];
                }

                // Update UI Text
                document.getElementById('product-title').textContent = currentProduct.name;
                document.getElementById('product-description').textContent = currentProduct.description || 'Sin descripción disponible.';
                document.getElementById('product-category').textContent = currentProduct.category || 'General';
                
                // Setup gallery
                setupGallery();

                // Check if user is admin
                checkAdminStatus();

            } catch (error) {
                console.error('Error loading product:', error);
                alert('Error al cargar el producto');
            }
        }

        // Setup gallery
        function setupGallery() {
            const mainImage = document.getElementById('product-image');
            const thumbnailsContainer = document.getElementById('gallery-thumbnails');
            const counter = document.getElementById('image-counter');
            const prevBtn = document.getElementById('gallery-prev');
            const nextBtn = document.getElementById('gallery-next');

            // Set first image
            mainImage.src = productImages[0];
            
            // Show/hide counter and nav buttons
            if (productImages.length > 1) {
                counter.classList.remove('hidden');
                counter.textContent = `1 / ${productImages.length}`;
                prevBtn.style.display = 'flex';
                nextBtn.style.display = 'flex';
            } else {
                counter.classList.add('hidden');
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
            }

            // Create thumbnails if more than 1 image
            if (productImages.length > 1) {
                thumbnailsContainer.classList.remove('hidden');
                thumbnailsContainer.innerHTML = productImages.map((img, idx) => `
                    <img src="${img}" 
                         alt="Imagen ${idx + 1}" 
                         class="gallery-thumbnail ${idx === 0 ? 'active' : ''}" 
                         onclick="jumpToImage(${idx})">
                `).join('');
            } else {
                thumbnailsContainer.classList.add('hidden');
            }
        }

        // Change image
        function changeImage(direction) {
            currentImageIndex += direction;
            
            if (currentImageIndex < 0) {
                currentImageIndex = productImages.length - 1;
            } else if (currentImageIndex >= productImages.length) {
                currentImageIndex = 0;
            }
            
            updateGallery();
        }

        // Jump to specific image
        function jumpToImage(index) {
            currentImageIndex = index;
            updateGallery();
        }

        // Update gallery display
        function updateGallery() {
            const mainImage = document.getElementById('product-image');
            const thumbnails = document.querySelectorAll('.gallery-thumbnail');
            const counter = document.getElementById('image-counter');

            mainImage.src = productImages[currentImageIndex];
            
            // Update counter
            counter.textContent = `${currentImageIndex + 1} / ${productImages.length}`;
            
            // Update thumbnails
            thumbnails.forEach((thumb, idx) => {
                if (idx === currentImageIndex) {
                    thumb.classList.add('active');
                } else {
                    thumb.classList.remove('active');
                }
            });
        }

        // Handle Main Action (Buy or Claim)
        async function handleMainAction() {
            const token = localStorage.getItem('dc_access_token');
            
            if (!token) {
                alert('Debes iniciar sesión para ' + (isFreeProduct ? 'canjear' : 'comprar') + ' este producto');
                window.location.href = 'index.html';
                return;
            }

            try {
                // Verify User
                const response = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Not authenticated');
                
                const user = await response.json();

                // If it's NOT free, you might want to integrate a payment gateway here.
                // For now, assuming the logic is similar (add to DB) but maybe check payment status.
                // Since I don't have your payment backend, I'll simulate the success flow for both.
                
                if (!isFreeProduct) {
                    // Aquí iría la lógica de Stripe/PayPal si fuera real.
                    // Por ahora, asumimos que el botón "Comprar" lleva al proceso.
                    const confirmPurchase = confirm(`¿Confirmar compra de "${currentProduct.name}" por $${currentProduct.price}?`);
                    if (!confirmPurchase) return;
                }

                // Add to Clientes Collection
                const purchaseData = {
                    discord_id: user.id,
                    username: user.username,
                    avatar: user.avatar,
                    products: [{
                        id: productId,
                        name: currentProduct.name,
                        price: isFreeProduct ? "Gratis" : "$" + currentProduct.price
                    }],
                    total_price: isFreeProduct ? "Gratis" : "$" + currentProduct.price,
                    date: firebase.firestore.FieldValue.serverTimestamp(),
                    status: isFreeProduct ? "Canjeado" : "Comprado"
                };

                await db.collection("Clientes").add(purchaseData);
                
                // Create License
                await createLicense(productId, currentProduct.name, user);

                const msg = isFreeProduct ? '¡Producto canjeado exitosamente!' : '¡Compra realizada con éxito!';
                alert(msg);
                window.location.href = 'AreaCliente.html';

            } catch (error) {
                console.error('Error processing action:', error);
                alert('Error al procesar: ' + error.message);
            }
        }

        // Download product
        async function downloadProduct() {
            if (!currentProduct) return;

            const token = localStorage.getItem('dc_access_token');
            
            if (!token) {
                alert('Debes iniciar sesión para descargar');
                window.location.href = 'index.html';
                return;
            }

            try {
                const userResponse = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!userResponse.ok) throw new Error('Not authenticated');
                
                const user = await userResponse.json();

                // Check ownership (unless it's free? No, usually need to claim first)
                const purchases = await db.collection("Clientes")
                    .where("discord_id", "==", user.id)
                    .get();

                let ownsProduct = false;
                purchases.forEach(doc => {
                    const data = doc.data();
                    if (data.products && data.products.some(p => p.id === productId)) {
                        ownsProduct = true;
                    }
                });

                // Allow download if owned OR if it is free (and maybe we want to allow direct download for free items without claiming? 
                // Usually better to force claim first so they get the license key. I'll enforce ownership).
                
                if (!ownsProduct) {
                    alert('Debes comprar o canjear este producto primero para descargarlo.');
                    return;
                }

                if (currentProduct.file_data) {
                    const link = document.createElement('a');
                    link.href = currentProduct.file_data;
                    link.download = currentProduct.file_name || 'producto_papeleta.zip';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } else {
                    alert('Archivo no disponible temporalmente.');
                }

            } catch (error) {
                console.error('Error downloading product:', error);
                alert('Error al descargar: ' + error.message);
            }
        }

        // Create license
        async function createLicense(productId, productName, user) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let key = '';
            for (let i = 0; i < 20; i++) {
                key += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            const licenseData = {
                discord_id: user.id,
                username: user.username,
                product_id: productId,
                product_name: productName,
                key: key,
                created_at: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'active',
                type: isFreeProduct ? 'free_claim' : 'purchase'
            };

            await db.collection("Licencias").add(licenseData);
            return licenseData;
        }

        // Check if user is admin
        async function checkAdminStatus() {
            const token = localStorage.getItem('dc_access_token');
            if (!token) return;

            try {
                const response = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const user = await response.json();
                    currentUser = user;
                    
                    // Check if admin (Add your admin IDs here)
                    const adminIds = ['890526767608127489']; 
                    if (adminIds.includes(user.id)) {
                        document.getElementById('delete-btn').classList.remove('hidden');
                    }
                }
            } catch (error) {
                console.error('Error checking auth:', error);
            }
        }

        // Delete product
        async function eliminarProducto() {
            if (!confirm('¿Estás seguro de eliminar este producto permanentemente?')) return;

            try {
                await db.collection("Productos").doc(productId).delete();
                alert('Producto eliminado correctamente');
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Error deleting product:', error);
                alert('Error al eliminar');
            }
        }

        // Network background animation
        function initNetworkBg() {
            const canvas = document.getElementById('network-bg');
            const ctx = canvas.getContext('2d');
            let w, h, points;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            points = Array.from({ length: 50 }, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4
            }));

            function tick() {
                ctx.clearRect(0, 0, w, h);
                points.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;
                });
                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        const dx = points[i].x - points[j].x;
                        const dy = points[i].y - points[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 160) {
                            ctx.strokeStyle = `rgba(255,26,26,${0.15 * (1 - dist / 160)})`;
                            ctx.lineWidth = 0.8;
                            ctx.beginPath();
                            ctx.moveTo(points[i].x, points[i].y);
                            ctx.lineTo(points[j].x, points[j].y);
                            ctx.stroke();
                        }
                    }
                    ctx.fillStyle = 'rgba(255,26,26,0.6)';
                    ctx.beginPath();
                    ctx.arc(points[i].x, points[i].y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                requestAnimationFrame(tick);
            }
            tick();
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadProduct();
            initNetworkBg();
        });
    </script>
</body>
</html>
