<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto | Papeleta Store</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff1a1a'/%3E%3Cstop offset='1' stop-color='%23cc1b1b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='70' font-family='Arial, sans-serif' font-size='58' font-weight='900' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-body: #050507;
            --bg-card: rgba(20, 10, 10, 0.6);
            --primary: #ff1a1a;
            --success: #00ff44;
            --text-main: #ffffff;
            --text-muted: #9496a1;
        }
        
        body {
            background: linear-gradient(to bottom, #150a0a, #0a0505);
            color: #f3f4f6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        .red-glow {
            text-shadow: 0 0 18px rgba(255, 26, 26, 0.85);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #150a0a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #951d1d; border-radius: 3px; }

        #network-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }

        .product-card {
            background: rgba(20, 10, 10, 0.6);
            border: 1px solid rgba(255, 26, 26, 0.15);
            backdrop-filter: blur(10px);
        }

        .badge-gratis {
            background: linear-gradient(135deg, #00ff44, #00cc33);
            box-shadow: 0 0 20px rgba(0, 255, 68, 0.4);
        }

        .btn-reclamar {
            background: linear-gradient(135deg, #00cc33, #009922);
            transition: all 0.3s ease;
        }

        .btn-reclamar:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 255, 68, 0.3);
        }

        .btn-detalles {
            border: 1px solid rgba(255, 26, 26, 0.3);
            transition: all 0.3s ease;
        }

        .btn-detalles:hover {
            border-color: rgba(255, 26, 26, 0.6);
            background: rgba(255, 26, 26, 0.1);
        }

        .btn-eliminar {
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff4444;
            transition: all 0.3s ease;
        }

        .btn-eliminar:hover {
            background: rgba(255, 0, 0, 0.1);
            border-color: rgba(255, 0, 0, 0.6);
        }
    </style>
</head>
<body class="relative">

    <canvas id="network-bg"></canvas>

    <!-- Header -->
    <header class="relative z-10 bg-[#0d0505]/90 backdrop-blur border-b border-red-900/30 sticky top-0 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-red-500 to-red-800 flex items-center justify-center font-black text-white">P</div>
                <span class="text-white font-black tracking-widest text-lg">PAPELETA <span class="text-red-400">STORE</span></span>
            </div>
            <button onclick="window.location.href='index.html'" class="text-gray-400 hover:text-white transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> Volver
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 max-w-4xl mx-auto px-6 py-12">
        
        <!-- Product Card -->
        <div class="product-card rounded-2xl overflow-hidden shadow-2xl">
            
            <!-- Product Image Container -->
            <div class="relative">
                <img id="product-image" src="" alt="Producto" class="w-full h-64 md:h-80 object-cover">
                
                <!-- Badge GRATIS -->
                <span id="price-badge" class="absolute top-4 right-4 badge-gratis text-black font-black px-4 py-2 rounded-full text-sm uppercase tracking-wider">
                    GRATIS
                </span>
            </div>

            <!-- Product Info -->
            <div class="p-6 md:p-8">
                <div class="mb-4">
                    <span id="product-category" class="inline-block bg-red-950/60 border border-red-800 text-red-300 text-xs font-bold px-3 py-1 rounded-full mb-3">
                        Scripts
                    </span>
                    <h1 id="product-title" class="text-3xl md:text-4xl font-black text-white mb-2">
                        Musica
                    </h1>
                    <p id="product-description" class="text-gray-400 text-base">
                        Musica para chipeo
                    </p>
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="reclamarProducto()" class="btn-reclamar text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2">
                        <i class="fas fa-gift"></i>
                        Reclamar
                    </button>
                    <button onclick="verDetalles()" class="btn-detalles text-gray-300 font-semibold py-4 rounded-xl flex items-center justify-center gap-2">
                        <i class="fas fa-info-circle"></i>
                        Detalles
                    </button>
                </div>

                <!-- Delete Button (Admin Only) -->
                <button id="delete-btn" onclick="eliminarProducto()" class="btn-eliminar w-full mt-4 py-3 rounded-xl flex items-center justify-center gap-2 text-sm font-semibold hidden">
                    <i class="fas fa-trash"></i>
                    Eliminar
                </button>
            </div>
        </div>

        <!-- Additional Info -->
        <div class="mt-8 grid md:grid-cols-3 gap-4">
            <div class="product-card rounded-xl p-4 text-center">
                <i class="fas fa-download text-red-400 text-2xl mb-2"></i>
                <p class="text-white font-semibold text-sm">Descarga Inmediata</p>
                <p class="text-gray-500 text-xs mt-1">Acceso instantáneo</p>
            </div>
            <div class="product-card rounded-xl p-4 text-center">
                <i class="fas fa-shield-alt text-red-400 text-2xl mb-2"></i>
                <p class="text-white font-semibold text-sm">Soporte Incluido</p>
                <p class="text-gray-500 text-xs mt-1">Ayuda 24/7</p>
            </div>
            <div class="product-card rounded-xl p-4 text-center">
                <i class="fas fa-sync text-red-400 text-2xl mb-2"></i>
                <p class="text-white font-semibold text-sm">Actualizaciones</p>
                <p class="text-gray-500 text-xs mt-1">Gratis de por vida</p>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="relative z-10 bg-[#080505] text-center py-6 border-t border-red-950/30 text-xs text-gray-500 mt-12">
        <p>&copy; 2026 Papeleta Store. Todos los derechos reservados.</p>
    </footer>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBWggE0KFiVZDxwxvmhuWXEKu6bNguV0mM",
            authDomain: "papeletalicencia.firebaseapp.com",
            databaseURL: "https://papeletalicencia-default-rtdb.firebaseio.com",
            projectId: "papeletalicencia",
            storageBucket: "papeletalicencia.firebasestorage.app",
            messagingSenderId: "677208314051",
            appId: "1:677208314051:web:a27c04f31d402e83f29276"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        let currentProduct = null;
        let currentUser = null;

        // Load product data
        async function loadProduct() {
            if (!productId) {
                alert('Producto no especificado');
                window.location.href = 'index.html';
                return;
            }

            try {
                const doc = await db.collection("Productos").doc(productId).get();
                
                if (!doc.exists) {
                    alert('Producto no encontrado');
                    window.location.href = 'index.html';
                    return;
                }

                currentProduct = doc.data();
                
                // Update UI
                document.getElementById('product-image').src = currentProduct.image_url || 'https://via.placeholder.com/800x600';
                document.getElementById('product-title').textContent = currentProduct.name;
                document.getElementById('product-description').textContent = currentProduct.description || 'Sin descripción';
                document.getElementById('product-category').textContent = currentProduct.category || 'General';
                
                // Check if free or paid
                if (Number(currentProduct.price) === 0) {
                    document.getElementById('price-badge').textContent = 'GRATIS';
                    document.getElementById('price-badge').classList.add('badge-gratis');
                } else {
                    document.getElementById('price-badge').textContent = '$' + Number(currentProduct.price).toFixed(2);
                    document.getElementById('price-badge').classList.remove('badge-gratis');
                    document.getElementById('price-badge').classList.add('bg-red-600', 'text-white');
                }

                // Check if user is admin
                checkAdminStatus();

            } catch (error) {
                console.error('Error loading product:', error);
                alert('Error al cargar el producto');
            }
        }

        // Check if user is admin
        async function checkAdminStatus() {
            const token = localStorage.getItem('dc_access_token');
            if (!token) return;

            try {
                const response = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const user = await response.json();
                    currentUser = user;
                    
                    // Check if admin (replace with your admin IDs)
                    const adminIds = ['890526767608127489'];
                    if (adminIds.includes(user.id)) {
                        document.getElementById('delete-btn').classList.remove('hidden');
                    }
                }
            } catch (error) {
                console.error('Error checking auth:', error);
            }
        }

        // Claim product
        async function reclamarProducto() {
            const token = localStorage.getItem('dc_access_token');
            
            if (!token) {
                alert('Debes iniciar sesión para reclamar este producto');
                window.location.href = 'index.html';
                return;
            }

            try {
                // Get user data
                const response = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Not authenticated');
                
                const user = await response.json();

                // Save to Firebase "Clientes" collection
                const purchaseData = {
                    discord_id: user.id,
                    username: user.username,
                    avatar: user.avatar,
                    products: [{
                        id: productId,
                        name: currentProduct.name,
                        price: Number(currentProduct.price) === 0 ? "Gratis" : "$" + currentProduct.price
                    }],
                    total_price: Number(currentProduct.price) === 0 ? "Gratis" : "$" + currentProduct.price,
                    date: firebase.firestore.FieldValue.serverTimestamp(),
                    status: "Reclamado Exitosamente"
                };

                await db.collection("Clientes").add(purchaseData);

                // Generate license
                await createLicense(productId, currentProduct.name, user);

                alert('¡Producto reclamado exitosamente!\n\nSe ha generado tu licencia automáticamente.\n\nGracias por confiar en Papeleta Store.');
                
                // Redirect to client area
                window.location.href = 'AreaCliente.html';

            } catch (error) {
                console.error('Error claiming product:', error);
                alert('Error al reclamar el producto: ' + error.message);
            }
        }

        // Create license
        async function createLicense(productId, productName, user) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let key = '';
            for (let i = 0; i < 20; i++) {
                key += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            const licenseData = {
                discord_id: user.id,
                username: user.username,
                product_id: productId,
                product_name: productName,
                key: key,
                created_at: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'active'
            };

            await db.collection("Licencias").add(licenseData);
            return licenseData;
        }

        // View details
        function verDetalles() {
            alert(`Detalles del Producto:\n\nNombre: ${currentProduct.name}\nCategoría: ${currentProduct.category}\nPrecio: ${Number(currentProduct.price) === 0 ? 'GRATIS' : '$' + currentProduct.price}\n\nDescripción:\n${currentProduct.description}\n\nArchivo: ${currentProduct.file_name || 'No disponible'}`);
        }

        // Delete product (Admin only)
        async function eliminarProducto() {
            if (!confirm('¿Estás seguro de eliminar este producto? Esta acción no se puede deshacer.')) {
                return;
            }

            try {
                await db.collection("Productos").doc(productId).delete();
                alert('Producto eliminado correctamente');
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Error deleting product:', error);
                alert('Error al eliminar el producto');
            }
        }

        // Network background animation
        function initNetworkBg() {
            const canvas = document.getElementById('network-bg');
            const ctx = canvas.getContext('2d');
            let w, h, points;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            points = Array.from({ length: 45 }, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3
            }));

            function tick() {
                ctx.clearRect(0, 0, w, h);
                points.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;
                });
                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        const dx = points[i].x - points[j].x;
                        const dy = points[i].y - points[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            ctx.strokeStyle = `rgba(255,26,26,${1 - dist / 150})`;
                            ctx.lineWidth = 0.6;
                            ctx.beginPath();
                            ctx.moveTo(points[i].x, points[i].y);
                            ctx.lineTo(points[j].x, points[j].y);
                            ctx.stroke();
                        }
                    }
                    ctx.fillStyle = 'rgba(255,26,26,0.8)';
                    ctx.beginPath();
                    ctx.arc(points[i].x, points[i].y, 1.8, 0, Math.PI * 2);
                    ctx.fill();
                }
                requestAnimationFrame(tick);
            }
            tick();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadProduct();
            initNetworkBg();
        });
    </script>
</body>
</html>
