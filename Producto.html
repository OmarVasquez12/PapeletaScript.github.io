<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto | Papeleta Store</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff1a1a'/%3E%3Cstop offset='1' stop-color='%23cc1b1b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='70' font-family='Arial, sans-serif' font-size='58' font-weight='900' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-body: #050507;
            --bg-card: rgba(20, 10, 10, 0.6);
            --primary: #ff1a1a;
            --success: #00ff44;
            --text-main: #ffffff;
            --text-muted: #9496a1;
        }
        
        body {
            background: linear-gradient(to bottom, #150a0a, #0a0505);
            color: #f3f4f6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        .red-glow {
            text-shadow: 0 0 18px rgba(255, 26, 26, 0.85);
        }

        #network-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }

        .product-card {
            background: rgba(20, 10, 10, 0.6);
            border: 1px solid rgba(255, 26, 26, 0.15);
            backdrop-filter: blur(10px);
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff1a1a;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            animation: bounce 0.3s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .btn-reclamar {
            background: linear-gradient(135deg, #00cc33, #009922);
            transition: all 0.3s ease;
        }

        .btn-reclamar:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 255, 68, 0.3);
        }

        .btn-comprar {
            background: linear-gradient(135deg, #ff1a1a, #cc0000);
            transition: all 0.3s ease;
        }

        .btn-comprar:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 26, 26, 0.3);
        }

        .btn-download {
            border: 1px solid rgba(255, 26, 26, 0.3);
            transition: all 0.3s ease;
        }

        .btn-download:hover {
            border-color: rgba(255, 26, 26, 0.6);
            background: rgba(255, 26, 26, 0.1);
        }

        .btn-eliminar {
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff4444;
            transition: all 0.3s ease;
        }

        .btn-eliminar:hover {
            background: rgba(255, 0, 0, 0.1);
            border-color: rgba(255, 0, 0, 0.6);
        }

        /* Gallery Styles - Compact */
        .gallery-container {
            position: relative;
            background: rgba(13, 5, 5, 0.8);
        }

        .gallery-main-image {
            width: 100%;
            height: 250px;
            object-fit: contain;
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.1), rgba(153, 27, 27, 0.1));
        }

        .gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(220, 38, 38, 0.9);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 12px;
            z-index: 10;
        }

        .gallery-nav:hover {
            background: rgba(220, 38, 38, 1);
            transform: translateY(-50%) scale(1.1);
        }

        .gallery-nav.prev { left: 10px; }
        .gallery-nav.next { right: 10px; }

        .gallery-thumbnails {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            overflow-x: auto;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        .gallery-thumbnail {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            flex-shrink: 0;
            opacity: 0.6;
        }

        .gallery-thumbnail:hover {
            opacity: 1;
            border-color: rgba(220, 38, 38, 0.5);
            transform: scale(1.05);
        }

        .gallery-thumbnail.active {
            opacity: 1;
            border-color: #dc2626;
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.6);
        }

        .image-counter {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Cart Modal Styles */
        .cart-modal {
            backdrop-filter: blur(10px);
        }
        
        .cart-item {
            background: rgba(13, 5, 5, 0.6);
            border: 1px solid rgba(255, 26, 26, 0.2);
        }

        @media (max-width: 768px) {
            .gallery-main-image { height: 200px; }
            .gallery-nav { width: 28px; height: 28px; font-size: 10px; }
            .gallery-thumbnail { width: 50px; height: 50px; }
        }
    </style>
</head>
<body class="relative">

    <canvas id="network-bg"></canvas>

    <!-- Header -->
    <header class="relative z-10 bg-[#0d0505]/90 backdrop-blur border-b border-red-900/30 sticky top-0 px-4 py-3">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-red-500 to-red-800 flex items-center justify-center font-black text-white text-sm">P</div>
                <span class="text-white font-black tracking-widest text-base">PAPELETA <span class="text-red-400">STORE</span></span>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openCartModal()" class="relative bg-[#150a0a] hover:bg-[#1a0a0a] border border-red-900/50 w-10 h-10 rounded-full flex items-center justify-center transition-all group">

                    <span id="cart-count" class="cart-badge hidden">0</span>

            </div>

    </header>

    <!-- CART MODAL -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/80 z-[80] flex items-end md:items-center justify-center backdrop-blur-sm cart-modal">
        <div class="bg-[#150a0a] w-full md:w-[480px] md:rounded-2xl rounded-t-2xl border border-red-900/50 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="bg-red-600 px-6 py-4 rounded-t-2xl flex justify-between items-center shrink-0">
                <div class="flex items-center gap-3">
                    <i class="fas fa-shopping-bag text-white text-xl"></i>
                    <h2 class="text-white font-bold text-lg">Mi Carrito</h2>
                </div>
                <button onclick="closeCartModal()" class="text-white/80 hover:text-white w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center transition-all">
                    <i class="fas fa-times"></i>

            </div>

            <div class="flex-grow overflow-y-auto p-4">
                <div id="cart-items" class="space-y-3">
                </div>
                
                <div id="cart-empty" class="hidden text-center py-12">
                    <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-[#0d0505] flex items-center justify-center">
                        <i class="fas fa-shopping-cart text-gray-600 text-3xl"></i>
                    </div>
                    <p class="text-gray-400 mb-2">Tu carrito está vacío</p>
                    <p class="text-gray-500 text-sm">Agrega productos para comenzar</p>
                </div>
            </div>
            
            <div class="border-t border-red-900/50 p-4 bg-[#0d0505]/50 rounded-b-2xl shrink-0">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-gray-400 text-sm">Total a pagar:</span>
                    <span id="cart-total" class="text-2xl font-black text-white">$0.00</span>
                </div>
                
                <button id="claim-free-btn" onclick="claimFreeProducts()" class="hidden w-full bg-gradient-to-r from-green-600 to-green-700 hover:from-green-700 hover:to-green-800 text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-green-900/30 mb-3">
                    <i class="fas fa-gift"></i>
                    Reclamar Productos Gratis
                </button>
                
                <div id="paypal-button-container" class="mt-2"></div>
                
                <button id="manual-checkout-btn" onclick="checkoutManual()" class="w-full hidden bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-red-900/30">
                    <i class="fas fa-credit-card"></i>
                    Pagar Manualmente (Discord)
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="relative z-10 max-w-2xl mx-auto px-4 py-8">
        
        <!-- Product Card - Compact -->
        <div class="product-card rounded-xl overflow-hidden shadow-2xl">
            
            <!-- Gallery Container -->
            <div class="gallery-container relative">
                <img id="product-image" src="" alt="Producto" class="gallery-main-image">
                
                <!-- Image Counter -->
                <span id="image-counter" class="image-counter hidden">1 / 1</span>
                
                <!-- Navigation Buttons -->
                <button id="gallery-prev" class="gallery-nav prev" onclick="changeImage(-1)">

                    <button onclick="downloadProduct()" class="btn-download text-gray-300 font-semibold py-2.5 rounded-lg flex items-center justify-center gap-2 text-sm">

                <button id="delete-btn" onclick="eliminarProducto()" class="btn-eliminar w-full mt-3 py-2 rounded-lg flex items-center justify-center gap-2 text-xs font-semibold hidden">

        <!-- Additional Info - Compact -->
        <div class="mt-6 grid grid-cols-3 gap-3">
            <div class="product-card rounded-lg p-3 text-center">
                <i class="fas fa-download text-red-400 text-lg mb-1"></i>
                <p class="text-white font-semibold text-xs">Descarga</p>
                <p class="text-gray-500 text-[10px] mt-0.5">Inmediata</p>
            </div>
            <div class="product-card rounded-lg p-3 text-center">
                <i class="fas fa-shield-alt text-red-400 text-lg mb-1"></i>
                <p class="text-white font-semibold text-xs">Soporte</p>
                <p class="text-gray-500 text-[10px] mt-0.5">Incluido</p>
            </div>
            <div class="product-card rounded-lg p-3 text-center">
                <i class="fas fa-sync text-red-400 text-lg mb-1"></i>
                <p class="text-white font-semibold text-xs">Updates</p>

    </main>

    <!-- Footer -->
    <footer class="relative z-10 bg-[#080505] text-center py-4 border-t border-red-950/30 text-[10px] text-gray-500 mt-8">
        <p>&copy; 2026 Papeleta Store.</p>
    </footer>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBWggE0KFiVZDxwxvmhuWXEKu6bNguV0mM",
            authDomain: "papeletalicencia.firebaseapp.com",
            databaseURL: "https://papeletalicencia-default-rtdb.firebaseio.com",
            projectId: "papeletalicencia",
            storageBucket: "papeletalicencia.firebasestorage.app",
            messagingSenderId: "677208314051",
            appId: "1:677208314051:web:a27c04f31d402e83f29276"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        let currentProduct = null;
        let currentUser = null;
        let currentImageIndex = 0;
        let productImages = [];
        let cart = [];
        let isFreeProduct = false;

        // Load product data
        async function loadProduct() {
            if (!productId) {
                alert('Producto no especificado');
                window.location.href = 'index.html';
                return;
            }

            try {
                const doc = await db.collection("Productos").doc(productId).get();
                
                if (!doc.exists) {
                    alert('Producto no encontrado');
                    window.location.href = 'index.html';
                    return;
                }

                currentProduct = doc.data();
                
                // Check if free
                const priceVal = Number(currentProduct.price);
                const priceStr = String(currentProduct.price).toLowerCase();
                isFreeProduct = (priceVal === 0 || priceStr === 'gratis' || priceStr === 'free');

                // Setup images array
                if (currentProduct.images && currentProduct.images.length > 0) {
                    productImages = currentProduct.images;
                } else if (currentProduct.image_url) {
                    productImages = [currentProduct.image_url];
                } else {
                    productImages = ['https://via.placeholder.com/800x600'];
                }

                // Update UI
                document.getElementById('product-title').textContent = currentProduct.name;
                document.getElementById('product-description').textContent = currentProduct.description || 'Sin descripción';
                document.getElementById('product-category').textContent = currentProduct.category || 'General';
                
                // Update price display
                const priceDisplay = document.getElementById('price-display');
                if (isFreeProduct) {
                    priceDisplay.innerHTML = '<span class="text-2xl font-bold text-green-400">GRATIS</span><span class="text-gray-400 text-xs ml-2">Pago único, acceso de por vida</span>';
                } else {
                    priceDisplay.innerHTML = `<span class="text-2xl font-bold text-white">$${currentProduct.price}</span><span class="text-gray-400 text-xs ml-2">Pago único, acceso de por vida</span>`;
                }
                
                // Update main action button
                updateMainActionButton();
                
                // Setup gallery
                setupGallery();

                // Check if user is admin
                checkAdminStatus();

            } catch (error) {
                console.error('Error loading product:', error);
                alert('Error al cargar el producto');
            }
        }

        function updateMainActionButton() {
            const btn = document.getElementById('main-action-btn');
            if (isFreeProduct) {
                btn.className = 'btn-reclamar text-white font-bold py-2.5 rounded-lg flex items-center justify-center gap-2 text-sm';
                btn.innerHTML = '<i class="fas fa-gift"></i> Canjear Gratis';
            } else {
                btn.className = 'btn-comprar text-white font-bold py-2.5 rounded-lg flex items-center justify-center gap-2 text-sm';
                btn.innerHTML = '<i class="fas fa-shopping-cart"></i> Añadir al Carrito';
            }
        }

        // Setup gallery
        function setupGallery() {
            const mainImage = document.getElementById('product-image');
            const thumbnailsContainer = document.getElementById('gallery-thumbnails');
            const counter = document.getElementById('image-counter');
            const prevBtn = document.getElementById('gallery-prev');
            const nextBtn = document.getElementById('gallery-next');

            mainImage.src = productImages[0];
            
            if (productImages.length > 1) {
                counter.classList.remove('hidden');
                counter.textContent = `1 / ${productImages.length}`;
                prevBtn.style.display = 'flex';
                nextBtn.style.display = 'flex';
            } else {
                counter.classList.add('hidden');
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
            }

            if (productImages.length > 1) {
                thumbnailsContainer.classList.remove('hidden');
                thumbnailsContainer.innerHTML = productImages.map((img, idx) => `
                    <img src="${img}" 
                         alt="Imagen ${idx + 1}" 
                         class="gallery-thumbnail ${idx === 0 ? 'active' : ''}" 
                         onclick="jumpToImage(${idx})">
                `).join('');
            } else {
                thumbnailsContainer.classList.add('hidden');
            }
        }

        function changeImage(direction) {
            currentImageIndex += direction;
            if (currentImageIndex < 0) currentImageIndex = productImages.length - 1;
            else if (currentImageIndex >= productImages.length) currentImageIndex = 0;
            updateGallery();
        }

        function jumpToImage(index) {
            currentImageIndex = index;
            updateGallery();
        }

        function updateGallery() {
            const mainImage = document.getElementById('product-image');
            const thumbnails = document.querySelectorAll('.gallery-thumbnail');
            const counter = document.getElementById('image-counter');

            mainImage.src = productImages[currentImageIndex];
            counter.textContent = `${currentImageIndex + 1} / ${productImages.length}`;
            
            thumbnails.forEach((thumb, idx) => {
                if (idx === currentImageIndex) thumb.classList.add('active');
                else thumb.classList.remove('active');
            });
        }

        // CART FUNCTIONS
        function addToCart() {
            if (!currentProduct) return;
            
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                alert('Este producto ya está en tu carrito');
                openCartModal();
                return;
            }
            
            cart.push({
                id: productId,
                name: currentProduct.name,
                price: currentProduct.price,
                image: productImages[0]
            });
            
            updateCartUI();
            
            // Show animation
            const badge = document.getElementById('cart-count');
            badge.classList.remove('hidden');
            badge.classList.add('animate-bounce');
            setTimeout(() => badge.classList.remove('animate-bounce'), 1000);
            
            if (isFreeProduct) {
                alert('Producto añadido al carrito. Haz clic en el carrito para reclamarlo.');
            } else {
                alert('Producto añadido al carrito.');
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
        }

        function updateCartUI() {
            const countEl = document.getElementById('cart-count');
            const itemsEl = document.getElementById('cart-items');
            const emptyEl = document.getElementById('cart-empty');
            const totalEl = document.getElementById('cart-total');
            const claimBtn = document.getElementById('claim-free-btn');
            const paypalContainer = document.getElementById('paypal-button-container');
            const manualBtn = document.getElementById('manual-checkout-btn');
            
            const count = cart.length;
            if (count > 0) {
                countEl.textContent = count;
                countEl.classList.remove('hidden');
            } else {
                countEl.classList.add('hidden');
            }
            
            if (cart.length === 0) {
                itemsEl.innerHTML = '';
                emptyEl.classList.remove('hidden');
                claimBtn.classList.add('hidden');
                paypalContainer.innerHTML = '';
                manualBtn.classList.add('hidden');
            } else {
                emptyEl.classList.add('hidden');
                itemsEl.innerHTML = cart.map(item => `
                    <div class="cart-item rounded-xl p-3 flex items-center gap-3">
                        <img src="${item.image || ''}" alt="${item.name}" class="w-16 h-16 object-cover rounded-lg bg-[#150a0a]">
                        <div class="flex-grow min-w-0">
                            <h4 class="text-white font-semibold text-sm truncate">${item.name}</h4>
                            <p class="${Number(item.price) === 0 ? 'text-green-400' : 'text-red-400'} font-bold text-sm">${Number(item.price) === 0 ? 'GRATIS' : '$' + Number(item.price).toFixed(2)}</p>
                        </div>
                        <button onclick="removeFromCart('${item.id}')" class="text-red-400 hover:text-red-300 w-8 h-8 rounded-lg hover:bg-red-950/30 flex items-center justify-center transition-all">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `).join('');
                
                const total = cart.reduce((sum, item) => sum + Number(item.price), 0);
                totalEl.textContent = total === 0 ? 'GRATIS' : '$' + total.toFixed(2);
                
                const allFree = cart.every(item => Number(item.price) === 0);
                
                if (allFree && total === 0) {
                    claimBtn.classList.remove('hidden');
                    paypalContainer.innerHTML = '';
                    manualBtn.classList.add('hidden');
                } else {
                    claimBtn.classList.add('hidden');
                    renderPayPalButtons();
                    manualBtn.classList.remove('hidden');
                }
            }
        }

        function openCartModal() {
            document.getElementById('cart-modal').classList.remove('hidden');
            if (!cart.every(item => Number(item.price) === 0)) {
                renderPayPalButtons();
            }
        }

        function closeCartModal() {
            document.getElementById('cart-modal').classList.add('hidden');
        }

        function renderPayPalButtons() {
            const container = document.getElementById('paypal-button-container');
            container.innerHTML = ''; 
            
            if (cart.length === 0) return;
            
            const hasPaidProducts = cart.some(item => Number(item.price) > 0);
            if (!hasPaidProducts) return;

            const totalAmount = cart.reduce((sum, item) => sum + Number(item.price), 0).toFixed(2);

            paypal.Buttons({
                style: {
                    shape: 'rect',
                    color: 'gold',
                    layout: 'vertical',
                    label: 'pay',
                },
                createOrder: function(data, actions) {
                    return actions.order.create({
                        purchase_units: [{
                            description: 'Compra en Papeleta Store',
                            amount: { value: totalAmount }
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        alert('¡Pago completado por ' + details.payer.name.given_name + '!');
                        assignProductsToUserAfterPayment(details);
                        cart = [];
                        updateCartUI();
                        closeCartModal();
                    });
                }
            }).render('#paypal-button-container');
        }

        async function claimFreeProducts() {
            const token = localStorage.getItem('dc_access_token');
            
            if (!token) {
                alert('Debes iniciar sesión para reclamar productos gratis');
                window.location.href = 'index.html';
                return;
            }

            if (cart.length === 0) {
                alert('Tu carrito está vacío');
                return;
            }

            try {
                const response = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Not authenticated');
                
                const user = await response.json();

                const purchaseData = {
                    discord_id: user.id,
                    username: user.username,
                    avatar: user.avatar,
                    products: cart.map(item => ({
                        id: item.id,
                        name: item.name,
                        price: "Gratis"
                    })),
                    total_price: "Gratis",
                    date: firebase.firestore.FieldValue.serverTimestamp(),
                    status: "Reclamado Exitosamente"
                };

                await db.collection("Clientes").add(purchaseData);
                
                for (const item of cart) {
                    await createLicense(item.id, item.name, user);
                }

                alert('¡Productos reclamados exitosamente!');
                cart = [];
                updateCartUI();
                closeCartModal();
                window.location.href = 'AreaCliente.html';

            } catch (error) {
                console.error('Error claiming products:', error);
                alert('Error al reclamar: ' + error.message);
            }
        }

        async function assignProductsToUserAfterPayment(paymentDetails) {
            const token = localStorage.getItem('dc_access_token');
            if (!token) return;
            
            try {
                const response = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Not authenticated');
                const user = await response.json();

                const purchaseData = {
                    discord_id: user.id,
                    username: user.username,
                    avatar: user.avatar,
                    products: cart.map(item => ({
                        id: item.id,
                        name: item.name,
                        price: "$" + Number(item.price).toFixed(2)
                    })),
                    total_price: "$" + cart.reduce((sum, item) => sum + Number(item.price), 0).toFixed(2),
                    payment_id: paymentDetails.id,
                    payer_email: paymentDetails.payer.email_address,
                    date: firebase.firestore.FieldValue.serverTimestamp(),
                    status: "Pagado"
                };

                await db.collection("Clientes").add(purchaseData);
                
                for (const item of cart) {
                    await createLicense(item.id, item.name, user);
                }
                
                alert("¡Productos añadidos a tu biblioteca!");
            } catch (error) {
                console.error(error);
                alert('Error al registrar la compra: ' + error.message);
            }
        }

        function checkoutManual() {
            if (cart.length === 0) {
                alert('Tu carrito está vacío');
                return;
            }
            alert(`Serás redirigido a Discord para coordinar el pago manual.`);
            window.open('https://discord.gg/rvxEdWcGkf', '_blank');
        }

        // Handle main action button
        function handleMainAction() {
            if (isFreeProduct) {
                addToCart();
                // Auto open cart for free products
                setTimeout(() => openCartModal(), 300);
            } else {
                addToCart();
            }
        }

        // Download product
        async function downloadProduct() {
            if (!currentProduct) return;

            const token = localStorage.getItem('dc_access_token');
            
            if (!token) {
                alert('Debes iniciar sesión para descargar');
                window.location.href = 'index.html';
                return;
            }

            try {
                const userResponse = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!userResponse.ok) throw new Error('Not authenticated');
                
                const user = await userResponse.json();

                const purchases = await db.collection("Clientes")
                    .where("discord_id", "==", user.id)
                    .get();

                let ownsProduct = false;
                purchases.forEach(doc => {
                    const data = doc.data();
                    if (data.products && data.products.some(p => p.id === productId)) {
                        ownsProduct = true;
                    }
                });

                if (!ownsProduct && Number(currentProduct.price) !== 0) {
                    alert('Debes comprar este producto primero');
                    return;
                }

                if (currentProduct.file_data) {
                    const link = document.createElement('a');
                    link.href = currentProduct.file_data;
                    link.download = currentProduct.file_name || 'producto.zip';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    alert('Descarga iniciada');
                } else {
                    alert('Este producto no tiene archivo disponible');
                }

            } catch (error) {
                console.error('Error downloading product:', error);
                alert('Error al descargar: ' + error.message);
            }
        }

        // Create license
        async function createLicense(productId, productName, user) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let key = '';
            for (let i = 0; i < 20; i++) {
                key += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            const licenseData = {
                discord_id: user.id,
                username: user.username,
                product_id: productId,
                product_name: productName,
                key: key,
                created_at: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'active'
            };

            await db.collection("Licencias").add(licenseData);
            return licenseData;
        }

        // Check if user is admin
        async function checkAdminStatus() {
            const token = localStorage.getItem('dc_access_token');
            if (!token) return;

            try {
                const response = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const user = await response.json();
                    currentUser = user;
                    
                    const adminIds = ['890526767608127489'];
                    if (adminIds.includes(user.id)) {
                        document.getElementById('delete-btn').classList.remove('hidden');
                    }
                }
            } catch (error) {
                console.error('Error checking auth:', error);
            }
        }

        // Delete product
        async function eliminarProducto() {
            if (!confirm('¿Eliminar este producto?')) return;

            try {
                await db.collection("Productos").doc(productId).delete();
                alert('Producto eliminado');
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Error deleting product:', error);
                alert('Error al eliminar');
            }
        }

        // Network background
        function initNetworkBg() {
            const canvas = document.getElementById('network-bg');
            const ctx = canvas.getContext('2d');
            let w, h, points;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            points = Array.from({ length: 45 }, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3
            }));

            function tick() {
                ctx.clearRect(0, 0, w, h);
                points.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;
                });
                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        const dx = points[i].x - points[j].x;
                        const dy = points[i].y - points[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            ctx.strokeStyle = `rgba(255,26,26,${1 - dist / 150})`;
                            ctx.lineWidth = 0.6;
                            ctx.beginPath();
                            ctx.moveTo(points[i].x, points[i].y);
                            ctx.lineTo(points[j].x, points[j].y);
                            ctx.stroke();
                        }
                    }
                    ctx.fillStyle = 'rgba(255,26,26,0.8)';
                    ctx.beginPath();
                    ctx.arc(points[i].x, points[i].y, 1.8, 0, Math.PI * 2);
                    ctx.fill();
                }
                requestAnimationFrame(tick);
            }
            tick();
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadProduct();
            initNetworkBg();
        });
    </script>
