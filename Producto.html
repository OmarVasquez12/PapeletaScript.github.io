<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto | Papeleta Store</title>
    <!-- Icono Rojo -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff1a1a'/%3E%3Cstop offset='1' stop-color='%23cc1b1b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='70' font-family='Arial, sans-serif' font-size='58' font-weight='900' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            /* TUS COLORES ROJOS */
            --primary: #ff1a1a;
            --primary-dark: #991b1b;
            --bg-dark: #050507;
            --card-bg: rgba(20, 5, 5, 0.7);
            --border-color: rgba(255, 26, 26, 0.2);
        }
        
        body {
            background-color: var(--bg-dark);
            color: #f3f4f6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Fondo de Red Animada */
        #network-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        /* Estilos Generales de Botones (Estilo Imagen Referencia pero Rojo) */
        .btn-primary {
            background: linear-gradient(to right, #dc2626, #991b1b);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.5);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            border-color: rgba(255, 26, 26, 0.5);
            background: rgba(255, 26, 26, 0.05);
        }

        /* Contenedor Principal Glassmorphism */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
        }

        /* Galería */
        .gallery-frame {
            background: #000;
            border: 1px dashed rgba(220, 38, 38, 0.4); /* Borde punteado rojo sutil */
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            z-index: 10;
        }
        .gallery-nav:hover { background: var(--primary); border-color: var(--primary); }
        .nav-prev { left: 10px; }
        .nav-next { right: 10px; }

        .thumbnails-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .thumb {
            width: 70px;
            height: 50px;
            border-radius: 6px;
            cursor: pointer;
            opacity: 0.5;
            border: 1px solid transparent;
            transition: 0.2s;
            object-fit: cover;
        }
        .thumb:hover, .thumb.active {
            opacity: 1;
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(220, 38, 38, 0.4);
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0505; }
        ::-webkit-scrollbar-thumb { background: #450a0a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #7f1d1d; }

        /* Badge Gratis */
        .badge-gratis {
            color: #4ade80; /* Verde neón */
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
        }

        /* Badge del Carrito Flotante */
        .cart-float-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 50;
            background: #dc2626;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.5);
            cursor: pointer;
            transition: transform 0.3s;
            text-decoration: none;
        }
        .cart-float-btn:hover {
            transform: scale(1.1);
        }
        .cart-count-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: white;
            color: #dc2626;
            font-size: 12px;
            font-weight: bold;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #dc2626;
        }
    </style>
</head>
<body class="relative">

    <!-- Fondo Animado -->
    <canvas id="network-bg"></canvas>

    <!-- Header Simple -->
    <header class="relative z-10 border-b border-white/5 bg-black/40 backdrop-blur-md sticky top-0">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-8 h-8 rounded bg-red-600 flex items-center justify-center font-bold text-white shadow-[0_0_10px_rgba(220,38,38,0.6)]">P</div>
                <span class="font-bold tracking-wider text-lg">PAPELETA <span class="text-red-500">STORE</span></span>
            </div>
            
            <!-- Botón Ver Carrito en Header -->
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-gray-400 hover:text-white text-sm flex items-center gap-2 transition-colors">
                    <i class="fas fa-arrow-left"></i> Volver a la Tienda
                </a>
                <a href="index.html" class="relative group">
                    <i class="fas fa-shopping-cart text-xl text-gray-300 group-hover:text-red-500 transition-colors"></i>
                    <span id="header-cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <!-- MODIFICADO: Se cambió mx-auto por ml-4 md:ml-10 para alinearlo a la izquierda -->
    <main class="relative z-10 w-full max-w-7xl ml-4 md:ml-10 py-10 pr-4">
        
        <!-- Layout Grid: Izquierda (Imagen) - Derecha (Info) -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <!-- COLUMNA IZQUIERDA: GALERÍA -->
            <div class="lg:col-span-7 flex flex-col">
                <!-- Marco de Imagen Principal -->
                <div class="gallery-frame shadow-2xl shadow-red-900/10 group">
                    <img id="main-image" src="" alt="Producto" class="gallery-image p-2">
                    
                    <!-- Contador de Imagen -->
                    <div class="absolute top-4 left-4 bg-black/60 px-3 py-1 rounded-full text-xs font-mono border border-white/10 backdrop-blur-sm">
                        <span id="current-img-idx">1</span> / <span id="total-img-idx">1</span>
                    </div>

                    <!-- Flechas de Navegación -->
                    <button class="gallery-nav nav-prev" onclick="moveSlide(-1)"><i class="fas fa-chevron-left"></i></button>
                    <button class="gallery-nav nav-next" onclick="moveSlide(1)"><i class="fas fa-chevron-right"></i></button>
                </div>

                <!-- Miniaturas -->
                <div id="thumbnails-list" class="thumbnails-container mt-4">
                    <!-- Se llenan con JS -->
                </div>

                <!-- Pestañas Simuladas (Estético) -->
                <div class="flex gap-4 mt-6 border-b border-white/10 pb-2">
                    <button class="text-red-500 font-semibold border-b-2 border-red-500 pb-2 px-2 text-sm flex items-center gap-2">
                        <i class="fas fa-image"></i> IMAGEN
                    </button>
                    <button class="text-gray-500 hover:text-gray-300 pb-2 px-2 text-sm flex items-center gap-2 transition-colors">
                        <i class="fas fa-video"></i> VIDEO
                    </button>
                </div>
            </div>

            <!-- COLUMNA DERECHA: DETALLES Y COMPRA -->
            <div class="lg:col-span-5 flex flex-col gap-6">
                
                <!-- Etiquetas Superiores -->
                <div class="flex gap-3 mb-2">
                    <span id="prod-category" class="px-3 py-1 rounded-full border border-red-500/30 text-red-400 text-xs font-bold uppercase tracking-wide bg-red-500/5">
                        MAPS
                    </span>
                    <span class="px-3 py-1 rounded-full border border-white/10 text-gray-400 text-xs font-bold uppercase tracking-wide bg-white/5">
                        ENTREGA INSTANTÁNEA
                    </span>
                </div>

                <!-- Título -->
                <h1 id="prod-title" class="text-4xl md:text-5xl font-black text-white leading-tight tracking-tight">
                    Cargando...
                </h1>

                <!-- Caja de Precio (Estilo Imagen Referencia) -->
                <div class="glass-panel p-6 flex items-center justify-between mt-2">
                    <div id="price-tag" class="text-4xl font-bold text-white">
                        $0.00
                    </div>
                    <div class="text-right">
                        <p class="text-gray-400 text-sm font-medium">Pago único, acceso de por vida</p>
                        <p class="text-gray-600 text-xs mt-1">(+ Comisión procesadora calc. al final)</p>
                    </div>
                </div>

                <!-- BOTONES DE ACCIÓN (Dinámicos) -->
                <div class="flex flex-col gap-4 mt-2">
                    
                    <!-- Botón Principal (Cambiará según sea Gratis o Pago) -->
                    <button id="main-action-btn" onclick="addToCartFromDetail()" class="btn-primary w-full py-4 rounded-xl text-white font-bold text-lg flex items-center justify-center gap-3 shadow-lg">
                        <!-- JS inyectará icono y texto aquí -->
                    </button>

                    <!-- Separador "O Compra Rápida" (Solo visual si es pago) -->
                    <div id="divider-buy" class="relative flex py-2 items-center hidden">
                        <div class="flex-grow border-t border-white/10"></div>
                        <span class="flex-shrink-0 mx-4 text-gray-500 text-xs uppercase font-bold tracking-widest">O Compra Rápida</span>
                        <div class="flex-grow border-t border-white/10"></div>
                    </div>

                    <!-- Botón Secundario (Tarjeta / Descargar) -->
                    <button id="secondary-action-btn" onclick="downloadProduct()" class="btn-secondary w-full py-3.5 rounded-xl text-gray-300 font-semibold flex items-center justify-center gap-3 hover:text-white">
                        <i class="fas fa-credit-card"></i> Comprar con Tarjeta
                    </button>

                    <!-- Botón Volver -->
                    <button onclick="window.location.href='index.html'" class="w-full py-3 text-gray-500 hover:text-gray-300 text-sm font-medium transition-colors">
                        Volver a la Tienda
                    </button>
                </div>

                <!-- Descripción Corta -->
                <div class="mt-4 glass-panel p-5">
                    <h3 class="text-white font-bold mb-2 flex items-center gap-2">
                        <i class="fas fa-align-left text-red-500"></i> Descripción del Producto
                    </h3>
                    <p id="prod-desc" class="text-gray-400 text-sm leading-relaxed">
                        ...
                    </p>
                </div>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 border-t border-white/5 bg-black/40 text-center py-6 text-xs text-gray-600 mt-10">
        <p>&copy; 2026 Papeleta Store. Todos los derechos reservados.</p>
    </footer>

    <!-- LÓGICA JAVASCRIPT -->
    <script>
        // Configuración Firebase (La misma que usaste)
        const firebaseConfig = {
            apiKey: "AIzaSyBWggE0KFiVZDxwxvmhuWXEKu6bNguV0mM",
            authDomain: "papeletalicencia.firebaseapp.com",
            databaseURL: "https://papeletalicencia-default-rtdb.firebaseio.com",
            projectId: "papeletalicencia",
            storageBucket: "papeletalicencia.firebasestorage.app",
            messagingSenderId: "677208314051",
            appId: "1:677208314051:web:a27c04f31d402e83f29276"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        let currentProduct = null;
        let images = [];
        let currentIndex = 0;
        let isFree = false;

        // --- LÓGICA DEL CARRITO (COMPARTIDA CON INDEX.HTML) ---
        let cart = JSON.parse(localStorage.getItem('papeleta_cart') || '[]');

        function saveCart() {
            localStorage.setItem('papeleta_cart', JSON.stringify(cart));
            updateCartBadge();
        }

        function updateCartBadge() {
            const count = cart.length;
            const badge = document.getElementById('header-cart-count');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function addToCartFromDetail() {
            if (!currentProduct) return;

            // Verificar si ya está en el carrito
            const exists = cart.find(item => item.id === currentProduct.id);
            if (exists) {
                alert("Este producto ya está en tu carrito.");
                window.location.href = 'index.html'; // Redirigir al index para ver el carrito
                return;
            }

            // Agregar al carrito
            cart.push({
                id: currentProduct.id,
                name: currentProduct.name,
                price: currentProduct.price,
                image: currentProduct.image_url || (images.length > 0 ? images[0] : '')
            });

            saveCart();
            
            // Feedback visual
            const btn = document.getElementById('main-action-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-check"></i> ¡Añadido!`;
            btn.style.background = "#16a34a"; // Verde temporal
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = ""; // Volver al gradiente original
                window.location.href = 'index.html'; // Redirigir al index para completar compra
            }, 1000);
        }

        // --- CARGAR PRODUCTO ---
        async function loadProduct() {
            if (!productId) return window.location.href = 'index.html';

            try {
                const doc = await db.collection("Productos").doc(productId).get();
                if (!doc.exists) return window.location.href = 'index.html';

                currentProduct = doc.data();

                // 1. Determinar si es GRATIS
                const priceVal = Number(currentProduct.price);
                const priceStr = String(currentProduct.price).toLowerCase();
                isFree = (priceVal === 0 || priceStr === 'gratis' || priceStr === 'free');

                // 2. Configurar Textos Básicos
                document.getElementById('prod-title').textContent = currentProduct.name;
                document.getElementById('prod-desc').textContent = currentProduct.description || "Sin descripción.";
                document.getElementById('prod-category').textContent = currentProduct.category || "General";

                // 3. Configurar PRECIO y BOTONES (Lógica Visual Clave)
                const priceTag = document.getElementById('price-tag');
                const mainBtn = document.getElementById('main-action-btn');
                const secBtn = document.getElementById('secondary-action-btn');
                const divider = document.getElementById('divider-buy');

                if (isFree) {
                    // ESTILO GRATIS
                    priceTag.innerHTML = `<span class="badge-gratis">GRATIS</span>`;
                    
                    mainBtn.className = "btn-primary w-full py-4 rounded-xl text-white font-bold text-lg flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(74,222,128,0.2)]";
                    mainBtn.innerHTML = `<i class="fas fa-gift"></i> Añadir al Carrito (Gratis)`;
                    
                    // Ocultar botón secundario de tarjeta
                    secBtn.innerHTML = `<i class="fas fa-info-circle"></i> Más Información`;
                    divider.classList.add('hidden');

                } else {
                    // ESTILO PAGO
                    priceTag.textContent = `$${currentProduct.price}`;
                    
                    mainBtn.className = "btn-primary w-full py-4 rounded-xl text-white font-bold text-lg flex items-center justify-center gap-3";
                    mainBtn.innerHTML = `<i class="fas fa-shopping-cart"></i> Añadir al Carrito`;
                    
                    secBtn.innerHTML = `<i class="fas fa-credit-card"></i> Comprar con Tarjeta`;
                    divider.classList.remove('hidden');
                }

                // 4. Configurar Galería
                setupGallery();
                
                // 5. Actualizar badge del carrito al cargar
                updateCartBadge();

            } catch (error) {
                console.error(error);
            }
        }

        // --- GALERÍA ---
        function setupGallery() {
            images = currentProduct.images && currentProduct.images.length > 0 
                     ? currentProduct.images 
                     : [currentProduct.image_url || 'https://via.placeholder.com/800x450'];
            
            currentIndex = 0;
            updateGalleryUI();

            const container = document.getElementById('thumbnails-list');
            container.innerHTML = '';
            
            if (images.length > 1) {
                images.forEach((src, idx) => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.className = `thumb ${idx === 0 ? 'active' : ''}`;
                    img.onclick = () => jumpTo(idx);
                    container.appendChild(img);
                });
            }
        }

        function updateGalleryUI() {
            const mainImg = document.getElementById('main-image');
            mainImg.src = images[currentIndex];
            
            document.getElementById('current-img-idx').textContent = currentIndex + 1;
            document.getElementById('total-img-idx').textContent = images.length;

            // Actualizar miniaturas
            const thumbs = document.querySelectorAll('.thumb');
            thumbs.forEach((t, i) => {
                if(i === currentIndex) t.classList.add('active');
                else t.classList.remove('active');
            });
        }

        function moveSlide(dir) {
            currentIndex += dir;
            if (currentIndex < 0) currentIndex = images.length - 1;
            if (currentIndex >= images.length) currentIndex = 0;
            updateGalleryUI();
        }

        function jumpTo(idx) {
            currentIndex = idx;
            updateGalleryUI();
        }

        // --- ACCIONES SECUNDARIAS ---
        async function downloadProduct() {
            // Solo permite descargar si ya lo tiene (lógica simple)
            alert("Redirigiendo a pasarela de pago segura...");
            // Aquí iría tu lógica de descarga real o redirección a PayPal directo
        }

        // --- FONDO ANIMADO (Red Network) ---
        function initNetworkBg() {
            const canvas = document.getElementById('network-bg');
            const ctx = canvas.getContext('2d');
            let w, h, points = [];

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
                points = Array.from({length: 60}, () => ({
                    x: Math.random() * w, y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5
                }));
            }
            window.addEventListener('resize', resize);
            resize();

            function animate() {
                ctx.clearRect(0, 0, w, h);
                // Dibujar líneas
                for(let i=0; i<points.length; i++) {
                    let p = points[i];
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > w) p.vx *= -1;
                    if(p.y < 0 || p.y > h) p.vy *= -1;
                    
                    ctx.fillStyle = 'rgba(255, 26, 26, 0.5)'; // Puntos rojos
                    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();

                    for(let j=i+1; j<points.length; j++) {
                        let p2 = points[j];
                        let dx = p.x - p2.x, dy = p.y - p2.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if(dist < 150) {
                            ctx.strokeStyle = `rgba(255, 26, 26, ${1 - dist/150})`; // Líneas rojas
                            ctx.lineWidth = 0.5;
                            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        // Iniciar
        document.addEventListener('DOMContentLoaded', () => {
            loadProduct();
            initNetworkBg();
        });
    </script>
</body>
</html>
